name: CI

# Build the CLAP plugins and run the C++ unit tests, on all three supported
# platforms:
#
#   * macOS arm64 — the reference platform. Real Accelerate/vDSP, real
#     bundles; renders here are the null-test baseline, so this job must stay
#     green and byte-identical in behavior.
#   * Linux x64 — portable pffft-backed Accelerate shim + the webkit2gtk GUI
#     backend (Phase 3; compile+link verified here, runtime needs a real
#     host — see the scoping doc). Renders CANNOT be compared against
#     mac ones (different FFT backend), so this job's oracle is the unit
#     suite + test_tolerance_stages (steady-state magnitude/level invariants)
#     + the plugin-level ssl-integration test against a packaged dir-bundle.
#   * Windows x64 — same shim + the WebView2 GUI backend (Phase 3, same
#     compile-only caveat). Toolchain is clang-cl + Ninja: clang-cl keeps
#     the compiler front-end in the clang family shared with the mac/Linux
#     builds (same __builtin_* intrinsics, same conformance corners) while
#     linking against the MSVC runtime the ONNX Runtime prebuilt DLL
#     expects. Same oracle as Linux.
#
# Both non-mac jobs configure with -DAXON_REQUIRE_GUI=ON so a missing GUI
# dependency fails the configure instead of silently falling back to the
# headless stub.
#
# On top of build+ctest, the Linux and Windows jobs run clap-validator (a real
# out-of-process CLAP host) against the packaged dir-bundle — CLAP spec + GUI
# extension lifecycle conformance. On Linux it runs under Xvfb so the real
# webkit2gtk backend initializes (create/destroy, no crash, no zombie
# WebKitWebProcess). This is the automatable slice of the Phase-3 GUI-runtime
# gate that CI could not previously cover (issue #23); the remaining gate is
# interactive real-DAW UX + listening on native x64. A separate GUI-off job
# pins the webkit2gtk-less (-DAXON_GUI=OFF) stub build.
#
# macos-14/15 are arm64; macos-13 is Intel and would fail to configure.
# See docs/future/active/windows-linux-builds.md for the port's design.

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**", "ci/**"]
    paths:
      - "native/clap/**"
      - "weights/axon_bundle/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "native/clap/**"
      - "weights/axon_bundle/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + unit tests (macOS arm64)
    runs-on: macos-14 # Apple Silicon. macos-15 / macos-latest also work.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          clang --version | head -1
          echo "arch: $(uname -m)"

      # CLAP, nlohmann/json (git), ONNX Runtime (release tarball) and pffft
      # (git) are pulled at configure time into build/_deps. Cache them keyed
      # on the Fetch files.
      - name: Cache fetched deps (CLAP / json / ONNX Runtime / pffft)
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-arm64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-arm64-

      - name: Configure
        run: >
          cmake -S native/clap -B native/clap/build
          -G "Unix Makefiles"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build (both plugin dylibs + all unit tests)
        run: cmake --build native/clap/build -j

      - name: Run unit tests
        working-directory: native/clap/build
        run: |
          set -u
          ran=0; fail=0
          for t in test_*; do
            [ -x "$t" ] || continue
            ran=$((ran + 1))
            echo "::group::$t"
            if ./"$t"; then
              echo "PASS $t"
            else
              echo "::error title=unit test failed::$t exited non-zero"
              fail=$((fail + 1))
            fi
            echo "::endgroup::"
          done
          echo "ran=$ran  failed=$fail"
          if [ "$ran" -eq 0 ]; then
            echo "::error::no test_* binaries were found — build likely changed"
            exit 1
          fi
          exit "$fail"

  build-and-test-linux:
    name: build + unit tests (Linux x64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          c++ --version | head -1
          echo "arch: $(uname -m)"

      - name: Install apt deps (libsndfile for axon_bench; webkit2gtk for the GUI; xvfb for the validator display)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsndfile1-dev pkg-config libwebkit2gtk-4.1-dev libx11-dev xvfb

      - name: Cache fetched deps (CLAP / json / ONNX Runtime / pffft)
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-x64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-x64-

      - name: Configure
        run: >
          cmake -S native/clap -B native/clap/build
          -DCMAKE_BUILD_TYPE=Release
          -DAXON_REQUIRE_GUI=ON

      - name: Build (plugins + bench + all unit tests)
        run: cmake --build native/clap/build -j

      # Stage the composite dir-bundle so test_ssl_integration runs for real
      # on Linux (it self-skips without a packaged plugin). This exercises the
      # whole load path: dladdr resource discovery -> Resources/ probing ->
      # ORT session bring-up -> bench render.
      - name: Package Axon.clap (Linux directory bundle)
        run: bash native/clap/package_linux.sh axon "$PWD/weights/axon_bundle" "$PWD/build/Axon.clap"

      - name: Run test suite (ctest)
        run: ctest --test-dir native/clap/build --output-on-failure

      # clap-validator: a real out-of-process CLAP host that exercises the spec
      # (scan, params, state) and the GUI extension lifecycle. Run under Xvfb so
      # the webkit2gtk backend actually initializes — the automatable part of
      # the Phase-3 Linux GUI-runtime gate. Built from source with the runner's
      # preinstalled cargo (pinned by the repo's Cargo.lock via --locked).
      #
      # Point it at the INNER <executable>.clap: the packaged Axon.clap is a
      # directory bundle (ELF + Resources/ inside), so a host that takes a file
      # path — clap-validator does not recurse into directories — must load the
      # inner shared library. dladdr-based resource discovery still resolves
      # Resources/ as its sibling, so this exercises the real load + ORT path.
      - name: Install clap-validator
        run: cargo install --git https://github.com/free-audio/clap-validator --locked
      - name: Validate CLAP bundle (clap-validator, under Xvfb)
        run: |
          inner=$(ls "$PWD"/build/Axon.clap/*.clap)
          echo "Validating inner CLAP: $inner"
          xvfb-run -a clap-validator validate "$inner"

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-logs
          path: |
            native/clap/build/Testing/**/*.log
          if-no-files-found: ignore

  build-and-test-windows:
    name: build + unit tests (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      # clang-cl needs the MSVC toolchain environment (UCRT/STL headers,
      # libs, link.exe) on PATH/INCLUDE/LIB — this action runs vcvarsall for
      # the job. The LLVM toolchain itself is preinstalled on the runner
      # image; Ninja is installed below via chocolatey.
      - name: MSVC dev environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Show toolchain
        shell: bash
        run: |
          cmake --version
          clang-cl --version | head -2
          ninja --version
          python --version

      - name: Cache fetched deps (CLAP / json / ONNX Runtime / pffft / sndfile)
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-x64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-x64-

      # Why clang-cl (not MSVC cl): the DSP + timing headers use clang/gcc
      # __builtin_* intrinsics (e.g. __builtin_clzll), and keeping one
      # compiler front-end across all three platforms keeps warning and
      # conformance behavior aligned with the reference (mac) build.
      - name: Configure (clang-cl + Ninja)
        run: >
          cmake -S native/clap -B native/clap/build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang-cl
          -DCMAKE_CXX_COMPILER=clang-cl
          -DAXON_REQUIRE_GUI=ON

      - name: Build (plugins + bench + all unit tests)
        run: cmake --build native/clap/build -j

      # Stage the composite dir-bundle so test_ssl_integration runs for real
      # on Windows too — this exercises the whole Phase-2 surface end to end:
      # LoadLibraryEx plugin loading (dyn_module.hpp), GetModuleFileNameW
      # resource discovery -> Resources/ probing (resource_path.hpp), and the
      # ORTCHAR_T wide-path ORT session bring-up (ort_path.hpp).
      - name: Package Axon.clap (Windows directory bundle)
        run: python native/clap/package_windows.py axon weights/axon_bundle build/Axon.clap

      - name: Run test suite (ctest)
        run: ctest --test-dir native/clap/build --output-on-failure

      # clap-validator against the INNER <executable>.clap (the packaged
      # Axon.clap is a directory bundle; a CLAP on Windows is a renamed DLL, and
      # the validator takes a file path, not a directory). The windows-latest
      # runner has an interactive desktop and a preinstalled WebView2 runtime,
      # so the GUI extension lifecycle exercises the real WebView2 backend. Same
      # spec + GUI conformance gate as Linux; interactive real-DAW UX and the
      # WebView2-runtime-missing degrade path remain manual (see scoping doc).
      - name: Install clap-validator
        run: cargo install --git https://github.com/free-audio/clap-validator --locked
      # NON-BLOCKING until #26 is fixed: under clap-validator the Windows plugin
      # resolves onnxruntime.dll to a different copy on PATH (the runner ships
      # ORT 1.17.1) instead of its bundled 1.20.1, so ORT init fails before any
      # conformance test runs ("requested API version [20] is not available").
      # That is a Windows DLL-search-order fix (needs a real Windows box), not a
      # plugin conformance bug — the Linux clap-validator job stays blocking and
      # covers the spec + GUI lifecycle. Flip continue-on-error off once #26
      # lands so this becomes a real Windows gate (WebView2 backend).
      - name: Validate CLAP bundle (clap-validator)
        continue-on-error: true
        shell: pwsh
        run: |
          $inner = (Get-ChildItem build/Axon.clap -Filter *.clap | Select-Object -First 1).FullName
          Write-Host "Validating inner CLAP: $inner"
          clap-validator validate $inner

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs
          path: |
            native/clap/build/Testing/**/*.log
          if-no-files-found: ignore

  # Pins the webkit2gtk-less ship decision (scoping doc item 6): -DAXON_GUI=OFF
  # must build+link the headless GUI stub with no webkit2gtk / X11 dependency,
  # so a GUI-enabled .clap is not the only shippable Linux artifact. Build-only
  # (own build dir + cache); runs in parallel, off the critical path.
  build-linux-nogui:
    name: build (Linux x64, GUI off)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install apt deps (libsndfile only — no webkit2gtk/X11 with GUI off)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1-dev pkg-config

      - name: Cache fetched deps (CLAP / json / ONNX Runtime / pffft)
        uses: actions/cache@v4
        with:
          path: native/clap/build-nogui/_deps
          key: deps-nogui-${{ runner.os }}-x64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-nogui-${{ runner.os }}-x64-

      - name: Configure (GUI off → headless stub)
        run: >
          cmake -S native/clap -B native/clap/build-nogui
          -DCMAKE_BUILD_TYPE=Release
          -DAXON_GUI=OFF

      - name: Build (plugins + bench + unit tests, headless stub GUI)
        run: cmake --build native/clap/build-nogui -j
