name: CI

# Build the CLAP plugins and run the C++ unit tests, on all three supported
# platforms:
#
#   * macOS arm64 — the reference platform. Real Accelerate/vDSP, real
#     bundles; renders here are the null-test baseline, so this job must stay
#     green and byte-identical in behavior.
#   * Linux x64 — portable pffft-backed Accelerate shim + the webkit2gtk GUI
#     backend (Phase 3; compile+link verified here, runtime needs a real
#     host — see the scoping doc). Renders CANNOT be compared against
#     mac ones (different FFT backend), so this job's oracle is the unit
#     suite + test_tolerance_stages (steady-state magnitude/level invariants)
#     + the plugin-level ssl-integration test against a packaged dir-bundle.
#   * Windows x64 — same shim + the WebView2 GUI backend (Phase 3, same
#     compile-only caveat). Toolchain is clang-cl + Ninja: clang-cl keeps
#     the compiler front-end in the clang family shared with the mac/Linux
#     builds (same __builtin_* intrinsics, same conformance corners) while
#     linking against the MSVC runtime the ONNX Runtime prebuilt DLL
#     expects. Same oracle as Linux.
#
# Both non-mac jobs configure with -DAXON_REQUIRE_GUI=ON so a missing GUI
# dependency fails the configure instead of silently falling back to the
# headless stub.
#
# macos-14/15 are arm64; macos-13 is Intel and would fail to configure.
# See docs/future/active/windows-linux-builds.md for the port's design.

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
    paths:
      - "native/clap/**"
      - "weights/axon_bundle/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "native/clap/**"
      - "weights/axon_bundle/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + unit tests (macOS arm64)
    runs-on: macos-14 # Apple Silicon. macos-15 / macos-latest also work.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          clang --version | head -1
          echo "arch: $(uname -m)"

      # CLAP, nlohmann/json (git), ONNX Runtime (release tarball) and pffft
      # (git) are pulled at configure time into build/_deps. Cache them keyed
      # on the Fetch files.
      - name: Cache fetched deps (CLAP / json / ONNX Runtime / pffft)
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-arm64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-arm64-

      - name: Configure
        run: >
          cmake -S native/clap -B native/clap/build
          -G "Unix Makefiles"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build (both plugin dylibs + all unit tests)
        run: cmake --build native/clap/build -j

      - name: Run unit tests
        working-directory: native/clap/build
        run: |
          set -u
          ran=0; fail=0
          for t in test_*; do
            [ -x "$t" ] || continue
            ran=$((ran + 1))
            echo "::group::$t"
            if ./"$t"; then
              echo "PASS $t"
            else
              echo "::error title=unit test failed::$t exited non-zero"
              fail=$((fail + 1))
            fi
            echo "::endgroup::"
          done
          echo "ran=$ran  failed=$fail"
          if [ "$ran" -eq 0 ]; then
            echo "::error::no test_* binaries were found — build likely changed"
            exit 1
          fi
          exit "$fail"

  build-and-test-linux:
    name: build + unit tests (Linux x64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          c++ --version | head -1
          echo "arch: $(uname -m)"

      - name: Install apt deps (libsndfile for axon_bench; webkit2gtk for the GUI)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsndfile1-dev pkg-config libwebkit2gtk-4.1-dev libx11-dev

      - name: Cache fetched deps (CLAP / json / ONNX Runtime / pffft)
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-x64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-x64-

      - name: Configure
        run: >
          cmake -S native/clap -B native/clap/build
          -DCMAKE_BUILD_TYPE=Release
          -DAXON_REQUIRE_GUI=ON

      - name: Build (plugins + bench + all unit tests)
        run: cmake --build native/clap/build -j

      # Stage the composite dir-bundle so test_ssl_integration runs for real
      # on Linux (it self-skips without a packaged plugin). This exercises the
      # whole load path: dladdr resource discovery -> Resources/ probing ->
      # ORT session bring-up -> bench render.
      - name: Package Axon.clap (Linux directory bundle)
        run: bash native/clap/package_linux.sh axon "$PWD/weights/axon_bundle" "$PWD/build/Axon.clap"

      - name: Run test suite (ctest)
        run: ctest --test-dir native/clap/build --output-on-failure

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-logs
          path: |
            native/clap/build/Testing/**/*.log
          if-no-files-found: ignore

  build-and-test-windows:
    name: build + unit tests (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      # clang-cl needs the MSVC toolchain environment (UCRT/STL headers,
      # libs, link.exe) on PATH/INCLUDE/LIB — this action runs vcvarsall for
      # the job. The LLVM toolchain itself is preinstalled on the runner
      # image; Ninja is installed below via chocolatey.
      - name: MSVC dev environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Show toolchain
        shell: bash
        run: |
          cmake --version
          clang-cl --version | head -2
          ninja --version
          python --version

      - name: Cache fetched deps (CLAP / json / ONNX Runtime / pffft / sndfile)
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-x64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-x64-

      # Why clang-cl (not MSVC cl): the DSP + timing headers use clang/gcc
      # __builtin_* intrinsics (e.g. __builtin_clzll), and keeping one
      # compiler front-end across all three platforms keeps warning and
      # conformance behavior aligned with the reference (mac) build.
      - name: Configure (clang-cl + Ninja)
        run: >
          cmake -S native/clap -B native/clap/build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang-cl
          -DCMAKE_CXX_COMPILER=clang-cl
          -DAXON_REQUIRE_GUI=ON

      - name: Build (plugins + bench + all unit tests)
        run: cmake --build native/clap/build -j

      # Stage the composite dir-bundle so test_ssl_integration runs for real
      # on Windows too — this exercises the whole Phase-2 surface end to end:
      # LoadLibraryEx plugin loading (dyn_module.hpp), GetModuleFileNameW
      # resource discovery -> Resources/ probing (resource_path.hpp), and the
      # ORTCHAR_T wide-path ORT session bring-up (ort_path.hpp).
      - name: Package Axon.clap (Windows directory bundle)
        run: python native/clap/package_windows.py axon weights/axon_bundle build/Axon.clap

      - name: Run test suite (ctest)
        run: ctest --test-dir native/clap/build --output-on-failure

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs
          path: |
            native/clap/build/Testing/**/*.log
          if-no-files-found: ignore
