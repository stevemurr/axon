name: Release

# Cut a release for ALL THREE platforms: build the composite Axon plugin from
# the committed bundle (weights/axon_bundle/ — needs no Python/torch), gate
# each platform on its full ctest suite, package per-platform, and publish
# ONE GitHub Release with all artifacts + checksums.
#
# Trigger by pushing a semver tag — `uv run axon release --major|--minor|
# --patch` computes the next version, runs the local suite, tags and pushes
# (scripts/cut_release.sh underneath) — or manually via workflow_dispatch.
#
# Platform setup steps deliberately mirror ci.yml job-for-job; if a setup
# step changes there, change it here.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish, e.g. v1.2.3 (created from the selected ref if it doesn't exist)."
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------- macOS
  build-macos:
    name: build + gate (macOS arm64)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache fetched deps
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-arm64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-arm64-

      # build.sh configures + builds (plugins + every test target), then
      # stages + ad-hoc-codesigns the .clap bundle.
      - name: Build Axon.clap from the committed bundle
        run: bash native/clap/build.sh axon "$PWD/weights/axon_bundle" "$PWD/dist/Axon.clap"

      - name: Gate on the full test suite
        run: ctest --test-dir native/clap/build --output-on-failure

      - name: Package (ditto zip — preserves symlink + codesignature)
        working-directory: dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent Axon.clap "Axon-macos-arm64.clap.zip"
          ls -lh Axon-macos-arm64.clap.zip

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/Axon-macos-arm64.clap.zip
          if-no-files-found: error

  # ---------------------------------------------------------------- Linux
  build-linux:
    name: build + gate (Linux x64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install apt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsndfile1-dev pkg-config libwebkit2gtk-4.1-dev libx11-dev

      - name: Cache fetched deps
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-x64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-x64-

      - name: Configure
        run: >
          cmake -S native/clap -B native/clap/build
          -DCMAKE_BUILD_TYPE=Release
          -DAXON_REQUIRE_GUI=ON

      - name: Build
        run: cmake --build native/clap/build -j

      - name: Package Axon.clap (directory bundle)
        run: bash native/clap/package_linux.sh axon "$PWD/weights/axon_bundle" "$PWD/dist/Axon.clap"

      - name: Gate on the full test suite
        run: ctest --test-dir native/clap/build --output-on-failure

      # tar.gz, not zip: the dir-bundle contains the libonnxruntime SONAME
      # symlink, which zip on Linux would materialize as a copy.
      - name: Archive
        working-directory: dist
        run: |
          tar -czf Axon-linux-x64.clap.tar.gz Axon.clap
          ls -lh Axon-linux-x64.clap.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/Axon-linux-x64.clap.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------- Windows
  build-windows:
    name: build + gate (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: MSVC dev environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Cache fetched deps
        uses: actions/cache@v4
        with:
          path: native/clap/build/_deps
          key: deps-${{ runner.os }}-x64-${{ hashFiles('native/clap/cmake/Fetch*.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-x64-

      - name: Configure (clang-cl + Ninja)
        run: >
          cmake -S native/clap -B native/clap/build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang-cl
          -DCMAKE_CXX_COMPILER=clang-cl
          -DAXON_REQUIRE_GUI=ON

      - name: Build
        run: cmake --build native/clap/build -j

      - name: Package Axon.clap (directory bundle)
        run: python native/clap/package_windows.py axon weights/axon_bundle dist/Axon.clap

      - name: Gate on the full test suite
        run: ctest --test-dir native/clap/build --output-on-failure

      - name: Archive
        working-directory: dist
        shell: pwsh
        run: Compress-Archive -Path Axon.clap -DestinationPath Axon-windows-x64.clap.zip

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/Axon-windows-x64.clap.zip
          if-no-files-found: error

  # ---------------------------------------------------------------- Publish
  publish:
    name: publish GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF_NAME}"
          else
            v="${{ inputs.tag }}"
          fi
          case "$v" in
            v[0-9]*) : ;;
            *) echo "::error::tag '$v' must look like v1.2.3"; exit 1 ;;
          esac
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Version-stamp + checksums
        working-directory: dist
        run: |
          v="${{ steps.ver.outputs.version }}"
          for f in Axon-macos-arm64.clap.zip Axon-linux-x64.clap.tar.gz Axon-windows-x64.clap.zip; do
            mv "$f" "${f/Axon-/Axon-$v-}"
          done
          sha256sum Axon-* > SHA256SUMS.txt
          ls -lh; cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Axon ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/Axon-*
            dist/SHA256SUMS.txt
          body: |
            **Axon — an adaptive neural mastering chain as a CLAP plugin.**

            Every artifact is gated on that platform's full test suite.

            | Platform | Artifact | Install |
            |---|---|---|
            | macOS (Apple Silicon) | `Axon-*-macos-arm64.clap.zip` | Unzip into `~/Library/Audio/Plug-Ins/CLAP/`. Ad-hoc codesigned, not notarized — clear quarantine on first load: `xattr -dr com.apple.quarantine Axon.clap` |
            | Linux (x64) | `Axon-*-linux-x64.clap.tar.gz` | Untar into `~/.clap/` (a directory-bundle: keep `Axon.clap/` intact). GUI needs webkit2gtk 4.1 at runtime; headless hosts get generic params. |
            | Windows (x64) | `Axon-*-windows-x64.clap.zip` | Unzip into `%COMMONPROGRAMFILES%\CLAP\` (keep the `Axon.clap` folder intact). GUI needs the WebView2 runtime. |

            **Status note:** macOS is the reference platform. The Linux and
            Windows builds are fully test-gated (identical unit + tolerance
            suites in CI) but their embedded GUIs are newly ported — treat
            them as beta and expect the generic parameter view to always work.

            Verify downloads: `shasum -a 256 -c SHA256SUMS.txt` (mac) /
            `sha256sum -c SHA256SUMS.txt` (Linux).
