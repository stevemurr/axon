<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axon</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #111111;
    --surface: #1e1e1e;
    --border:  #2a2a2a;
    --accent:  #2a9d8f;
    --text:    #dddddd;
    --dim:     #666666;
    --track:   #2a2a2a;
    --danger:  #e76f51;
  }

  html, body {
    width: 820px; height: 600px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    font-size: 11px;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Header ─────────────────────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 40px;
    padding: 0 14px 0 16px;
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text);
  }
  #logo span { color: var(--accent); }
  /* ── Chain strip ─────────────────────────────────────────── */
  #chain {
    display: flex;
    align-items: center;
    height: 72px;
    padding: 0 12px;
    background: #141414;
    border-bottom: 1px solid var(--border);
    gap: 0;
    flex-shrink: 0;
    overflow-x: auto;
  }
  #chain::-webkit-scrollbar { display: none; }

  .arrow {
    color: var(--dim);
    font-size: 14px;
    padding: 0 4px;
    flex-shrink: 0;
  }

  .proc-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.12s, background 0.12s;
    gap: 5px;
    position: relative;
  }
  .proc-card:hover { background: #252525; }
  .proc-card.selected {
    border-color: var(--accent);
    background: #1a2e2c;
  }
  .proc-card.drag-over { border-color: var(--accent); opacity: 0.7; }
  .proc-card[draggable="true"] { cursor: grab; }

  .proc-name {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text);
    text-align: center;
  }
  .proc-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .proc-dot.active { background: var(--accent); }

  /* ── Control surface ─────────────────────────────────────── */
  #surface {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 20px 12px;
    overflow: hidden;
  }
  #surface-title {
    display: none;        /* redundant with the selected stage tab; reclaim vertical space */
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--dim);
    margin-bottom: 0;
  }
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 18px;
    align-items: flex-start;
  }

  /* ── Knob ────────────────────────────────────────────────── */
  .knob-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: ns-resize;
  }
  .knob-wrap svg { display: block; }
  .knob-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--dim);
    text-align: center;
    max-width: 70px;
  }
  .knob-value {
    font-size: 9px;
    font-weight: 600;
    color: var(--accent);
    text-align: center;
    min-height: 12px;
    max-width: 70px;
  }

  /* ── Toggle button (C_L) ─────────────────────────────────── */
  .toggle-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .toggle-btn {
    width: 60px; height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    background: var(--surface);
    color: var(--dim);
    transition: all 0.12s;
  }
  .toggle-btn.on {
    border-color: var(--accent);
    background: #1a2e2c;
    color: var(--accent);
  }
  .toggle-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--dim);
    text-align: center;
  }
  .toggle-value {
    font-size: 9px;
    font-weight: 600;
    color: var(--accent);
    text-align: center;
    min-height: 12px;
  }

  /* ── Spectrum view ───────────────────────────────────────── */
  #spectrum-view {
    height: 160px;
    flex-shrink: 0;
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    padding: 6px 12px 6px;
    position: relative;
  }
  #spectrum-canvas {
    display: block;
    width: 676px;
    height: 148px;
  }
  #eq-view-toggle {
    position: absolute;
    top: 8px;
    right: 14px;
    display: none;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 0;
    cursor: pointer;
    font: 8px/1 -apple-system, sans-serif;
    letter-spacing: 0.08em;
    color: #555;
    overflow: hidden;
  }
  #eq-view-toggle span {
    display: inline-block;
    padding: 3px 8px;
    transition: background 0.15s, color 0.15s;
  }
  #eq-view-toggle span.active {
    background: #2a2a2a;
    color: #ccc;
  }

  /* ── Enum picker (e.g. AUTO EQ class) ────────────────────── */
  .enum-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 4px 6px;
    min-width: 96px;
  }
  .enum-select {
    appearance: none;
    -webkit-appearance: none;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 22px 6px 10px;
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--dim) 50%),
      linear-gradient(135deg, var(--dim) 50%, transparent 50%);
    background-position:
      calc(100% - 12px) 50%,
      calc(100% - 7px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    width: 100%;
  }
  .enum-select:hover { border-color: var(--accent); }
  .enum-select:focus {
    outline: none;
    border-color: var(--accent);
    background-color: #1a2e2c;
  }
  .enum-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── Sat filter display ─────────────────────────────────── */
  #sat-filter-wrap {
    display: none;
    margin-top: 10px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #0d0d0d;
  }
  #sat-filter-canvas { display: block; }
  #lim-viz-wrap {
    display: none;
    margin-top: 10px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #0d0d0d;
  }
  #lim-viz-canvas { display: block; }
  #lim-gr-wrap {
    display: none;
    margin-top: 10px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #0d0d0d;
  }
  #lim-gr-canvas { display: block; }
  #bc-crunch-wrap {
    display: none;
    margin-top: 10px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #0d0d0d;
  }
  #bc-crunch-canvas { display: block; }
  #exc-band-wrap {
    display: none;
    margin-top: 10px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #0d0d0d;
  }
  #exc-band-canvas { display: block; }

  /* ── Layout shell ────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    width: 820px;
    height: 600px;
  }
  /* ── Body row: main column + right-side meter panel ───────── */
  #body-row {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  #main-col {
    width: 700px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  /* ── Meter panel ─────────────────────────────────────────── */
  #meter-panel {
    width: 120px;
    flex-shrink: 0;
    background: #0d0d0d;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 8px 8px 10px;
    gap: 8px;
  }
  #meter-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--dim);
    text-align: center;
  }
  #meter-modes {
    display: flex;
    gap: 3px;
  }
  .meter-mode {
    flex: 1;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-align: center;
    padding: 4px 0;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    color: var(--dim);
    cursor: pointer;
  }
  .meter-mode.on {
    color: #0d0d0d;
    background: var(--accent);
    border-color: var(--accent);
  }
  #meter-canvas { display: block; width: 104px; height: 360px; }
  #meter-readouts {
    display: flex;
    gap: 6px;
  }
  .meter-ro {
    flex: 1;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 0 5px;
    background: #141414;
  }
  .meter-ro .lbl { font-size: 8px; color: var(--dim); letter-spacing: 0.1em; }
  .meter-ro .val { font-size: 14px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .meter-ro .val.in-zone { color: var(--accent); }
  #meter-toggles { display: flex; gap: 6px; }
  .meter-toggle {
    flex: 1;
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 6px 0;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    color: var(--dim);
    cursor: pointer;
  }
  .meter-toggle.on {
    color: #0d0d0d;
    background: var(--accent);
    border-color: var(--accent);
  }
  /* Bypass is a "monitor raw" state — use the danger hue when active. */
  #bypass-btn.on { background: var(--danger); border-color: var(--danger); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">A<span>X</span>ON</div>
  </div>
  <div id="body-row">
   <div id="main-col">
    <div id="chain"></div>
    <div id="spectrum-view">
      <canvas id="spectrum-canvas" width="676" height="148"></canvas>
      <button id="eq-view-toggle" title="Toggle EQ view">
        <span id="eq-view-curve" class="active">CURVE</span><span id="eq-view-bins">BINS</span>
      </button>
    </div>
    <div id="surface">
    <div id="surface-title">SELECT A PROCESSOR</div>
    <div id="controls"></div>
    <div id="sat-filter-wrap">
      <canvas id="sat-filter-canvas" width="660" height="194"></canvas>
    </div>
    <div id="lim-gr-wrap">
      <canvas id="lim-gr-canvas" width="660" height="74"></canvas>
    </div>
    <div id="bc-crunch-wrap">
      <canvas id="bc-crunch-canvas" width="660" height="194"></canvas>
    </div>
    <div id="lim-viz-wrap">
      <canvas id="lim-viz-canvas" width="660" height="108"></canvas>
    </div>
    <div id="exc-band-wrap">
      <canvas id="exc-band-canvas" width="660" height="194"></canvas>
    </div>
    </div>
   </div><!-- /main-col -->
   <div id="meter-panel">
     <div id="meter-title">LEVELS</div>
     <div id="meter-modes">
       <div class="meter-mode on" data-mode="lufs">LUFS</div>
       <div class="meter-mode" data-mode="rms">RMS</div>
       <div class="meter-mode" data-mode="peak">PEAK</div>
     </div>
     <canvas id="meter-canvas" width="208" height="720"></canvas>
     <div id="meter-readouts">
       <div class="meter-ro"><div class="lbl">IN</div><div class="val" id="meter-in-val">–</div></div>
       <div class="meter-ro"><div class="lbl">OUT</div><div class="val" id="meter-out-val">–</div></div>
     </div>
     <div id="meter-toggles">
       <div id="auto-gain-btn" class="meter-toggle" title="Match output loudness to input for fair A/B">AUTO GAIN</div>
       <div id="bypass-btn" class="meter-toggle" title="Audition the raw input (level-aligned, no DAW bypass)">BYPASS</div>
     </div>
   </div><!-- /meter-panel -->
  </div><!-- /body-row -->
</div>

<script>
// ============================================================
// DATA MODEL
// ============================================================

const PROCESSORS = [
  // SSL EQ (id 3) — SSL 9000 J channel EQ; sits before Auto EQ. LF/HF go
  // shelf<->bell via *_BELL; LMF/HMF carry Q; HPF/LPF have on/off + cutoff.
  // SEQ_AUTO/SPLIT/CAL are the Auto-EQ coupling (assist bands absorb the
  // Auto-EQ correction — press CAL to solve).
  { id: 3, name: 'EQ', params: [
      'SEQ_ON',
      'SEQ_HPF_ON', 'SEQ_HPF_F',
      'SEQ_LF_G',  'SEQ_LF_F',  'SEQ_LF_BELL',
      'SEQ_LMF_G', 'SEQ_LMF_F', 'SEQ_LMF_Q',
      'SEQ_HMF_G', 'SEQ_HMF_F', 'SEQ_HMF_Q',
      'SEQ_HF_G',  'SEQ_HF_F',  'SEQ_HF_BELL',
      'SEQ_LPF_ON', 'SEQ_LPF_F',
      'SEQ_DRIVE',
      'SEQ_AUTO', 'SEQ_SPLIT', 'SEQ_CAL', 'SEQ_RESET',
    ], wetParams: ['SEQ_ON'] },
  { id: 1, name: 'AUTO EQ',   params: ['CLS', 'EQ', 'EQR', 'EQB', 'EQS', 'EQ_ENGINE', 'EQ_RENDER', 'EQ0','EQ1','EQ2','EQ3','EQ4'], wetParams: ['EQ'] },
  // SATURATOR (id 2) removed from the chain for now — kept in the DSP/code,
  // just not exposed here. Re-add this entry + put 2 back in the order to restore.
  { id: 4, name: 'BUS COMP',  params: ['SSC', 'SSC_IN'],          wetParams: ['SSC'] },
  { id: 6, name: 'BASS MONO', params: ['BMI', 'BMF'],                   wetParams: ['BMI'] },
  // HARMONICS (id 7) removed from the chain for now — kept in the DSP/code
  // (MultibandExciter, the stage case, drawExcBand/buildListenButton, EXC_*
  // params), just not exposed here. Re-add this entry + put 7 back in the order
  // (and bump kNumStages) to restore.
  // { id: 7, name: 'HARMONICS', params: ['EXC_ON','EXC_WARM','EXC_PRES'], wetParams: ['EXC_ON'] },
  { id: 8, name: 'REVERB',    params: ['RVB_MIX','RVB_SIZE','RVB_WIDTH','RVB_DAMP','RVB_LOWCUT'], wetParams: ['RVB_MIX'] },
  { id: 9, name: 'WIDENER',   params: ['WID_ON','WID_AMT','WID_FREQ','WID_AIR'], wetParams: ['WID_ON'] },
  { id: 5, name: 'LIMITER',   params: ['MLD', 'MLC', 'MLG', 'MLS', 'MLA'], wetParams: ['MLI'] },
];

// Runtime state
let paramMeta   = {};   // id → { name, min, max, def, unit }
let paramValues = {};   // id → float
let procOrder   = [6,3,1,8,9,4,5];
let selectedProc = 6;

// ============================================================
// VALUE FORMATTING
// ============================================================

function formatValue(id, val) {
  const m = paramMeta[id];
  if (!m) return val.toFixed(2);
  const unit = m.unit;

  if (unit === 'enum' && Array.isArray(m.enumOptions) && m.enumOptions.length) {
    const idx = Math.max(0, Math.min(m.enumOptions.length - 1, Math.round(val)));
    return prettyEnum(m.enumOptions[idx]);
  }
  if (unit === 'dB') {
    const s = val >= 0 ? '+' : '';
    return `${s}${val.toFixed(1)} dB`;
  }
  if (unit === 'LUFS') return `${val.toFixed(1)} L`;
  if (unit === 'Hz')   return `${val.toFixed(2)} Hz`;
  if (unit === 'ms')   return `${Math.round(val)} ms`;
  if (unit === 'switch') return val >= 0.5 ? 'LIMIT' : 'COMP';
  if (unit === '' && m.max <= 1) return `${Math.round(val * 100)}%`;
  return val.toFixed(2);
}

// Display label for an enum option (e.g. 'full_mix' → 'FULL MIX').
function prettyEnum(s) {
  if (typeof s !== 'string') return String(s);
  return s.replace(/_/g, ' ').toUpperCase();
}

// ============================================================
// HOST COMMUNICATION
// ============================================================

function sendParam(id, value) {
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.axon) {
    window.webkit.messageHandlers.axon.postMessage({ type: 'setParam', id, value });
  }
  paramValues[id] = value;
  refreshKnob(id);
  refreshChain();
}

function sendOrderToHost(visibleOrder) {
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.axon) {
    // All stages are freely reorderable; send the order as-is.
    window.webkit.messageHandlers.axon.postMessage({ type: 'reorder', order: [...visibleOrder] });
  }
}

// ============================================================
// KNOB SVG
// ============================================================

const KNOB_R   = 26;
const KNOB_CX  = 30;
const KNOB_CY  = 32;
const ARC_MIN  = -135; // degrees from top (clock-wise from bottom-left)
const ARC_MAX  =  135;

function degToRad(d) { return d * Math.PI / 180; }

// Polar helper — angle 0 = top, positive = clockwise
function polarPt(cx, cy, r, angleDeg) {
  const rad = degToRad(angleDeg - 90);
  return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
}

function describeArc(cx, cy, r, startDeg, endDeg) {
  if (Math.abs(endDeg - startDeg) >= 360) {
    // Full circle
    return `M ${cx - r} ${cy} A ${r} ${r} 0 1 1 ${cx + r} ${cy} A ${r} ${r} 0 1 1 ${cx - r} ${cy}`;
  }
  const [sx, sy] = polarPt(cx, cy, r, startDeg);
  const [ex, ey] = polarPt(cx, cy, r, endDeg);
  const large    = (endDeg - startDeg + 360) % 360 > 180 ? 1 : 0;
  return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`;
}

function normalise(id) {
  const m = paramMeta[id];
  if (!m || m.max === m.min) return 0;
  return Math.max(0, Math.min(1, (paramValues[id] - m.min) / (m.max - m.min)));
}

function buildKnobSVG(id) {
  const t   = normalise(id);
  const ang = ARC_MIN + t * (ARC_MAX - ARC_MIN);

  const trackPath = describeArc(KNOB_CX, KNOB_CY, KNOB_R, ARC_MIN, ARC_MAX);
  const fillPath  = Math.abs(ang - ARC_MIN) < 1
    ? ''
    : describeArc(KNOB_CX, KNOB_CY, KNOB_R, ARC_MIN, ang);

  const [dx, dy] = polarPt(KNOB_CX, KNOB_CY, KNOB_R, ang);

  return `<svg width="60" height="64" viewBox="0 0 60 64" xmlns="http://www.w3.org/2000/svg">
    <path d="${trackPath}" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
    ${fillPath ? `<path d="${fillPath}" fill="none" stroke="#2a9d8f" stroke-width="3" stroke-linecap="round"/>` : ''}
    <circle cx="${KNOB_CX}" cy="${KNOB_CY}" r="14" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
    <circle cx="${dx.toFixed(2)}" cy="${dy.toFixed(2)}" r="2.5" fill="#fff"/>
  </svg>`;
}

// ============================================================
// KNOB INTERACTION
// ============================================================

let activeDrag = null; // { id, startY, startVal, norm }

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function onKnobMouseDown(e, id) {
  e.preventDefault();
  const m = paramMeta[id];
  if (!m) return;
  activeDrag = {
    id,
    startY:   e.clientY,
    startVal: paramValues[id] ?? m.def,
  };
  window.addEventListener('mousemove', onKnobMouseMove, { passive: false });
  window.addEventListener('mouseup',   onKnobMouseUp);
}

function onKnobMouseMove(e) {
  if (!activeDrag) return;
  e.preventDefault();
  const { id, startY, startVal } = activeDrag;
  const m = paramMeta[id];
  const dy = startY - e.clientY; // up = positive
  const delta = dy / 200 * (m.max - m.min);
  const newVal = clamp(startVal + delta, m.min, m.max);
  paramValues[id] = newVal;
  refreshKnob(id);
  refreshChain();
  sendParam(id, newVal);
}

function onKnobMouseUp() {
  activeDrag = null;
  window.removeEventListener('mousemove', onKnobMouseMove);
  window.removeEventListener('mouseup',   onKnobMouseUp);
}

function onKnobDblClick(id) {
  const m = paramMeta[id];
  if (!m) return;
  paramValues[id] = m.def;
  sendParam(id, m.def);
  refreshKnob(id);
  refreshChain();
}

// Refresh a single knob's SVG and value text in-place
function refreshKnob(id) {
  const el = document.querySelector(`.knob-wrap[data-id="${id}"]`);
  if (!el) return;
  el.querySelector('svg').outerHTML; // force query
  const svgSlot = el.querySelector('.knob-svg-slot');
  if (svgSlot) svgSlot.innerHTML = buildKnobSVG(id);
  const valEl = el.querySelector('.knob-value');
  if (valEl) valEl.textContent = formatValue(id, paramValues[id] ?? paramMeta[id]?.def ?? 0);
}

// ============================================================
// TOGGLE INTERACTION (C_L)
// ============================================================

function onToggleClick(id) {
  const m = paramMeta[id];
  if (!m) return;
  const cur = paramValues[id] ?? m.def;
  const next = cur >= 0.5 ? 0 : 1;
  paramValues[id] = next;
  sendParam(id, next);
  refreshToggle(id);
  refreshChain();                     // wet/enable toggles drive the active dot
  // Dynamic toggle relabels the Attack/Release knobs — rebuild the surface.
  if (id === 'MLA') renderSurface();
}

// Off/on labels for a toggle control.
function toggleLabels(id) {
  if (id === 'C_L') return ['COMP', 'LIMIT'];
  if (id === 'MLA') return ['EVEN', 'DYNAMIC'];
  if (id === 'EQ_ENGINE') return ['NEURAL', 'ADAPTIVE'];
  if (id === 'EQ_RENDER') return ['STFT', 'IIR'];
  // SSL EQ: LF/HF shape switch and the momentary coupling recalibrate.
  if (id === 'SEQ_LF_BELL' || id === 'SEQ_HF_BELL') return ['SHELF', 'BELL'];
  if (id === 'SEQ_CAL') return ['IDLE', 'CALIBRATE'];
  if (id === 'SEQ_RESET') return ['IDLE', 'RESET'];
  return ['OFF', 'ON'];
}

// Mode-aware knob label: in the limiter's Dynamic mode the adaptive controls
// drive the brickwall attack/release, so relabel them to match.
function knobLabel(id) {
  const m = paramMeta[id];
  const dyn = (paramValues['MLA'] ?? (paramMeta['MLA'] ? paramMeta['MLA'].def : 0)) >= 0.5;
  if (dyn && id === 'MLG') return 'Attack';
  if (dyn && id === 'MLS') return 'Release';
  return m ? m.name : id;
}

function refreshToggle(id) {
  const el = document.querySelector(`.toggle-wrap[data-id="${id}"]`);
  if (!el) return;
  const val = paramValues[id] ?? 0;
  const btn  = el.querySelector('.toggle-btn');
  const valEl = el.querySelector('.toggle-value');
  const offL = el.dataset.off || 'OFF', onL = el.dataset.on || 'ON';
  const isOn = val >= 0.5;
  btn.textContent = isOn ? onL : offL;
  btn.classList.toggle('on', isOn);
  if (valEl) valEl.textContent = isOn ? onL : offL;
}

// ============================================================
// ENUM PICKER (e.g. AUTO EQ class)
// ============================================================

function buildEnumPicker(id) {
  const m = paramMeta[id];
  const wrap = document.createElement('div');
  wrap.className = 'enum-wrap';
  wrap.dataset.id = id;

  const cur = paramValues[id] ?? m.def;
  const idx = Math.max(0, Math.min(m.enumOptions.length - 1, Math.round(cur)));

  const select = document.createElement('select');
  select.className = 'enum-select';
  m.enumOptions.forEach((opt, i) => {
    const option = document.createElement('option');
    option.value = String(i);
    option.textContent = prettyEnum(opt);
    if (i === idx) option.selected = true;
    select.appendChild(option);
  });
  select.addEventListener('change', () => {
    const v = parseInt(select.value, 10);
    if (Number.isFinite(v)) {
      paramValues[id] = v;
      sendParam(id, v);
    }
  });

  const label = document.createElement('div');
  label.className = 'enum-label';
  label.textContent = m.name;

  wrap.appendChild(select);
  wrap.appendChild(label);
  return wrap;
}

function refreshEnum(id) {
  const el = document.querySelector(`.enum-wrap[data-id="${id}"]`);
  if (!el) return;
  const m = paramMeta[id];
  if (!m || !Array.isArray(m.enumOptions)) return;
  const select = el.querySelector('select.enum-select');
  if (!select) return;
  const cur = paramValues[id] ?? m.def;
  const idx = Math.max(0, Math.min(m.enumOptions.length - 1, Math.round(cur)));
  if (select.selectedIndex !== idx) select.selectedIndex = idx;
}

// ============================================================
// BUILD CONTROL FOR A PARAM
// ============================================================

function buildControl(id) {
  const m = paramMeta[id];
  if (!m) return null;

  if (m.unit === 'enum' && Array.isArray(m.enumOptions) && m.enumOptions.length) {
    return buildEnumPicker(id);
  }

  if (id === 'C_L' || m.unit === 'switch') {
    // Toggle button (on/off, with id-specific labels).
    const [offL, onL] = toggleLabels(id);
    const wrap = document.createElement('div');
    wrap.className = 'toggle-wrap';
    wrap.dataset.id = id;
    wrap.dataset.off = offL;
    wrap.dataset.on  = onL;

    const val = paramValues[id] ?? m.def;
    const isOn = val >= 0.5;

    wrap.innerHTML = `
      <div class="toggle-btn${isOn ? ' on' : ''}">${isOn ? onL : offL}</div>
      <div class="toggle-label">${m.name}</div>
      <div class="toggle-value">${isOn ? onL : offL}</div>
    `;
    wrap.querySelector('.toggle-btn').addEventListener('click', () => onToggleClick(id));
    return wrap;
  }

  // Standard knob
  const wrap = document.createElement('div');
  wrap.className = 'knob-wrap';
  wrap.dataset.id = id;

  const val = paramValues[id] ?? m.def;
  wrap.innerHTML = `
    <div class="knob-svg-slot">${buildKnobSVG(id)}</div>
    <div class="knob-label">${knobLabel(id)}</div>
    <div class="knob-value">${formatValue(id, val)}</div>
  `;

  wrap.addEventListener('mousedown', e => onKnobMouseDown(e, id));
  wrap.addEventListener('dblclick',  () => onKnobDblClick(id));

  return wrap;
}

// HARMONICS "LISTEN": press-and-hold to solo the added harmonics (EXC_SOLO is a
// momentary switch). Held while the mouse is down; released on any window mouseup
// (so dragging off the button still releases). The window listener is wired once.
let _excSoloBtn = null;
function _excSoloSet(on) {
  if (!_excSoloBtn) return;
  paramValues['EXC_SOLO'] = on ? 1 : 0;
  sendParam('EXC_SOLO', on ? 1 : 0);
  _excSoloBtn.classList.toggle('on', on);
  const v = _excSoloBtn.parentElement && _excSoloBtn.parentElement.querySelector('.toggle-value');
  if (v) v.textContent = on ? 'SOLO' : 'hold';
}
function buildListenButton() {
  const wrap = document.createElement('div');
  wrap.className = 'toggle-wrap';
  wrap.innerHTML = `
    <div class="toggle-btn">LISTEN</div>
    <div class="toggle-label">Solo Harmonics</div>
    <div class="toggle-value">hold</div>`;
  _excSoloBtn = wrap.querySelector('.toggle-btn');
  _excSoloBtn.addEventListener('mousedown', e => { e.preventDefault(); _excSoloSet(true); });
  if (!window._excSoloWired) {
    window._excSoloWired = true;
    window.addEventListener('mouseup', () => _excSoloSet(false));
    window.addEventListener('blur',    () => _excSoloSet(false));
  }
  return wrap;
}

function renderSurface() {
  const proc = PROCESSORS.find(p => p.id === selectedProc);
  const title = document.getElementById('surface-title');
  const controls = document.getElementById('controls');
  const satWrap = document.getElementById('sat-filter-wrap');
  controls.innerHTML = '';

  if (!proc) {
    title.textContent = 'SELECT A PROCESSOR';
    satWrap.style.display = 'none';
    return;
  }

  title.textContent = proc.name;

  for (const id of proc.params) {
    const ctrl = buildControl(id);
    if (ctrl) controls.appendChild(ctrl);
  }

  // HARMONICS: press-and-hold "LISTEN" — momentary solo of the added harmonics.
  if (proc.id === 7) controls.appendChild(buildListenButton());

  const showFilter = selectedProc === 2;
  satWrap.style.display = showFilter ? 'block' : 'none';
  if (showFilter) drawSatFilter();

  const limWrap = document.getElementById('lim-viz-wrap');
  const showLim = selectedProc === 5;
  limWrap.style.display = showLim ? 'block' : 'none';
  const limGrWrap = document.getElementById('lim-gr-wrap');
  if (limGrWrap) limGrWrap.style.display = showLim ? 'block' : 'none';
  if (showLim) { drawLimViz(); drawLimGR(); }

  const bcWrap = document.getElementById('bc-crunch-wrap');
  const showBc = selectedProc === 4;   // Bus Comp = StageID 4
  if (bcWrap) bcWrap.style.display = showBc ? 'block' : 'none';
  if (showBc) drawBusCompCrunch();

  const excWrap = document.getElementById('exc-band-wrap');
  const showExc = selectedProc === 7;
  excWrap.style.display = showExc ? 'block' : 'none';
  if (showExc) drawExcBand();
}

// ============================================================
// SAT FILTER DISPLAY
// ============================================================

const SAT_FLO = 20, SAT_FHI = 20000, SAT_SR = 44100;

function satFreqToX(f, W) {
  return (Math.log10(f / SAT_FLO) / Math.log10(SAT_FHI / SAT_FLO)) * W;
}
function satXToFreq(x, W) {
  return SAT_FLO * Math.pow(SAT_FHI / SAT_FLO, Math.max(0, Math.min(1, x / W)));
}

let satFilterDrag = null; // 'HPF' | 'LPF' | null

function drawSatFilter() {
  const canvas = document.getElementById('sat-filter-canvas');
  if (!canvas) return;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  const DB_BOT = -48;
  const freqToX = f => satFreqToX(f, W);
  const dbToY   = db => (db / DB_BOT) * H;  // 0 dB → top (y=0), -48 dB → bottom (y=H)

  // Vertical frequency grid
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  [50, 100, 200, 500, 1000, 2000, 5000, 10000].forEach(f => {
    const x = Math.round(freqToX(f)) + 0.5;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  });

  // Horizontal dB grid
  ctx.strokeStyle = '#191919';
  [-12, -24, -36].forEach(db => {
    const y = Math.round(dbToY(db)) + 0.5;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });

  // Labels — frequency
  ctx.font = '8px -apple-system, sans-serif';
  ctx.fillStyle = '#2e2e2e';
  ctx.textAlign = 'center';
  [[100,'100'],[1000,'1k'],[10000,'10k']].forEach(([f, lbl]) => {
    ctx.fillText(lbl, freqToX(f), H - 3);
  });
  // Labels — dB
  ctx.textAlign = 'left';
  ctx.fillStyle = '#2e2e2e';
  [[-12,'-12'],[-24,'-24']].forEach(([db, lbl]) => {
    ctx.fillText(lbl, 3, dbToY(db) - 2);
  });

  // ── 1st-order bilinear HPF coefficients (matches C++) ─────
  const hpfHz = paramValues['SHF'] ?? (paramMeta['SHF']?.def ?? 20);
  const hK = Math.tan(Math.PI * hpfHz / SAT_SR);
  const hn = 1 / (1 + hK);
  const hB0 = hn, hB1 = -hn, hA1 = (hK - 1) * hn;

  // ── 1st-order bilinear LPF coefficients ───────────────────
  const lpfHz = paramValues['SLF'] ?? (paramMeta['SLF']?.def ?? 20000);
  const lK = Math.tan(Math.PI * lpfHz / SAT_SR);
  const ln = 1 / (1 + lK);
  const lB0 = lK * ln, lB1 = lK * ln, lA1 = (lK - 1) * ln;

  // 1st-order freq response (b2=a2=0 reduces to this form)
  function fo1Db(f, b0, b1, a1) {
    const w  = 2 * Math.PI * f / SAT_SR;
    const cw = Math.cos(w), sw = Math.sin(w);
    const nR = b0 + b1 * cw, nI = b1 * sw;
    const dR = 1  + a1 * cw, dI = a1 * sw;
    return 10 * Math.log10(Math.max((nR*nR+nI*nI)/(dR*dR+dI*dI), 1e-20));
  }

  const NPTS = 300;
  const xs = new Float32Array(NPTS);
  const ys = new Float32Array(NPTS);
  for (let i = 0; i < NPTS; i++) {
    const f  = SAT_FLO * Math.pow(SAT_FHI / SAT_FLO, i / (NPTS - 1));
    const db = fo1Db(f, hB0, hB1, hA1) + fo1Db(f, lB0, lB1, lA1);
    xs[i] = freqToX(f);
    ys[i] = dbToY(Math.max(DB_BOT, db));
  }

  // Stopband fill (above curve → subtle warm tint; regions below 0 dB where signal is cut)
  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (let i = 0; i < NPTS; i++) ctx.lineTo(xs[i], ys[i]);
  ctx.lineTo(W, 0);
  ctx.closePath();
  ctx.fillStyle = 'rgba(231,111,81,0.08)';
  ctx.fill();

  // Passband fill (below curve → teal tint; region where signal passes through at ~0 dB)
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < NPTS; i++) ctx.lineTo(xs[i], ys[i]);
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(42,157,143,0.12)';
  ctx.fill();

  // Curve line
  ctx.save();
  ctx.shadowBlur  = 6;
  ctx.shadowColor = '#2a9d8f';
  ctx.strokeStyle = '#2a9d8f';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  for (let i = 0; i < NPTS; i++) i === 0 ? ctx.moveTo(xs[i], ys[i]) : ctx.lineTo(xs[i], ys[i]);
  ctx.stroke();
  ctx.restore();

  // Dashed verticals at cutoffs
  const hpfX = freqToX(hpfHz);
  const lpfX = freqToX(lpfHz);
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);

  ctx.strokeStyle = 'rgba(42,157,143,0.45)';
  ctx.beginPath(); ctx.moveTo(hpfX + 0.5, 0); ctx.lineTo(hpfX + 0.5, H); ctx.stroke();

  ctx.strokeStyle = 'rgba(231,111,81,0.45)';
  ctx.beginPath(); ctx.moveTo(lpfX + 0.5, 0); ctx.lineTo(lpfX + 0.5, H); ctx.stroke();

  ctx.setLineDash([]);

  // Drag handles — circles at top of each cutoff line
  const HR = 5;
  ctx.lineWidth = 1.5;

  ctx.fillStyle   = 'rgba(42,157,143,0.85)';
  ctx.strokeStyle = '#2a9d8f';
  ctx.beginPath(); ctx.arc(hpfX, HR + 2, HR, 0, 2 * Math.PI);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle   = 'rgba(231,111,81,0.85)';
  ctx.strokeStyle = '#e76f51';
  ctx.beginPath(); ctx.arc(lpfX, HR + 2, HR, 0, 2 * Math.PI);
  ctx.fill(); ctx.stroke();

  // Cutoff frequency labels (below handle)
  ctx.font = '8px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(42,157,143,0.85)';
  const hpfLbl = hpfHz < 1000 ? `${Math.round(hpfHz)} Hz` : `${(hpfHz/1000).toFixed(1)} kHz`;
  ctx.textAlign = hpfX > W * 0.85 ? 'right' : 'left';
  ctx.fillText(hpfLbl, hpfX + (hpfX > W * 0.85 ? -7 : 7), 22);

  ctx.fillStyle = 'rgba(231,111,81,0.85)';
  const lpfLbl = lpfHz < 1000 ? `${Math.round(lpfHz)} Hz` : `${(lpfHz/1000).toFixed(1)} kHz`;
  ctx.textAlign = lpfX < W * 0.15 ? 'left' : 'right';
  ctx.fillText(lpfLbl, lpfX + (lpfX < W * 0.15 ? 7 : -7), 22);

  // Corner tags
  ctx.font = '7px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#333';
  ctx.fillText('HPF', 5, 10);
  ctx.textAlign = 'right';
  ctx.fillText('LPF', W - 5, 10);
}

// Drag interactivity for sat filter canvas
(function() {
  const canvas = document.getElementById('sat-filter-canvas');
  if (!canvas) return;

  function clientToCanvasX(e) {
    const rect = canvas.getBoundingClientRect();
    return (e.clientX - rect.left) * canvas.width / rect.width;
  }
  function hitTest(cx) {
    const hpfHz = paramValues['SHF'] ?? (paramMeta['SHF']?.def ?? 20);
    const lpfHz = paramValues['SLF'] ?? (paramMeta['SLF']?.def ?? 20000);
    if (Math.abs(cx - satFreqToX(hpfHz, canvas.width)) < 14) return 'HPF';
    if (Math.abs(cx - satFreqToX(lpfHz, canvas.width)) < 14) return 'LPF';
    return null;
  }

  canvas.addEventListener('mousedown', (e) => {
    satFilterDrag = hitTest(clientToCanvasX(e));
    if (satFilterDrag) e.preventDefault();
  });

  canvas.addEventListener('mousemove', (e) => {
    const cx = clientToCanvasX(e);
    canvas.style.cursor = (hitTest(cx) || satFilterDrag) ? 'ew-resize' : 'default';
    if (!satFilterDrag) return;
    const f = satXToFreq(cx, canvas.width);
    if (satFilterDrag === 'HPF') {
      const m = paramMeta['SHF'];
      const v = Math.max(m?.min ?? 20, Math.min(m?.max ?? 500, f));
      paramValues['SHF'] = v;
      sendParam('SHF', v);
    } else {
      const m = paramMeta['SLF'];
      const v = Math.max(m?.min ?? 1000, Math.min(m?.max ?? 20000, f));
      paramValues['SLF'] = v;
      sendParam('SLF', v);
    }
    drawSatFilter();
  });

  window.addEventListener('mouseup', () => { satFilterDrag = null; });
})();

// ============================================================
// EXCITER BAND DISPLAY
// ============================================================
// Shows the excited band (drag the Frequency / Tame edges) on a log axis, plus
// a LIVE overlay of what the exciter is actually adding — computed as the
// per-stage spectrum delta (after-exciter minus before-exciter), so you can see
// which region is being excited the most and how the band edges shape it.

// Latest spectrum frame, cached by drawSpectrum so the band display can draw
// across frames and on band-edge drags.
let excLastSpec = null;

// Latest DIRECT exciter wet-spectrum frame (window.axonExciter): the magnitude
// (dBFS) of exactly what the exciter ADDS, at log-spaced 20 Hz–20 kHz points.
// This is what drawExcBand's amber overlay plots.
let excWetSpec = null;

// ── Crossover comb-transfer helpers (analytic, see drawExcBand) ──────────
// 2nd-order Butterworth biquads matching exciter.hpp's design_hpf_/design_lpf_
// (RBJ, Q=1/√2), and the complex frequency response of a normalized biquad.
function excBiquadHPF(fc, sr) {
  const w0 = 2 * Math.PI * fc / sr, cw = Math.cos(w0), sw = Math.sin(w0);
  const alpha = sw / (2 * 0.70710678), a0 = 1 + alpha;
  return { b0: (1 + cw) / 2 / a0, b1: -(1 + cw) / a0, b2: (1 + cw) / 2 / a0,
           a1: -2 * cw / a0, a2: (1 - alpha) / a0 };
}
function excBiquadLPF(fc, sr) {
  const w0 = 2 * Math.PI * fc / sr, cw = Math.cos(w0), sw = Math.sin(w0);
  const alpha = sw / (2 * 0.70710678), a0 = 1 + alpha;
  return { b0: (1 - cw) / 2 / a0, b1: (1 - cw) / a0, b2: (1 - cw) / 2 / a0,
           a1: -2 * cw / a0, a2: (1 - alpha) / a0 };
}
function excBiquadResp(c, w) {  // complex H(e^{jw}) of a normalized biquad
  const c1 = Math.cos(w), s1 = Math.sin(w), c2 = Math.cos(2 * w), s2 = Math.sin(2 * w);
  const nr = c.b0 + c.b1 * c1 + c.b2 * c2, ni = -(c.b1 * s1 + c.b2 * s2);
  const dr = 1 + c.a1 * c1 + c.a2 * c2, di = -(c.a1 * s1 + c.a2 * s2);
  const dd = dr * dr + di * di;
  return { re: (nr * dr + ni * di) / dd, im: (ni * dr - nr * di) / dd };
}

function drawExcBand() {
  const canvas = document.getElementById('exc-band-canvas');
  if (!canvas) return;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  const freqToX = f => satFreqToX(f, W);   // shared 20 Hz–20 kHz log mapping

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Frequency grid + labels.
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  [50, 100, 200, 500, 1000, 2000, 5000, 10000].forEach(f => {
    const x = Math.round(freqToX(f)) + 0.5;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  });
  ctx.font = '8px -apple-system, sans-serif';
  ctx.fillStyle = '#2e2e2e';
  ctx.textAlign = 'center';
  [[100,'100'],[1000,'1k'],[10000,'10k']].forEach(([f, lbl]) => {
    ctx.fillText(lbl, freqToX(f), H - 3);
  });

  // ── Fixed HARMONICS zones ──────────────────────────────────────────────
  // Warmth excites the low-mids (even/2nd → body); Presence the highs
  // (even+odd → air). The 1–3.5 kHz mid gap is left untouched by design.
  const WARM_LO = 100, WARM_HI = 1000, PRES_LO = 3500, PRES_HI = 16500;
  const AMBER = 'rgba(249,199,79,', CYAN = 'rgba(120,200,255,';
  const warmX0 = freqToX(WARM_LO), warmX1 = freqToX(WARM_HI);
  const presX0 = freqToX(PRES_LO), presX1 = freqToX(PRES_HI);
  const warm = paramValues['EXC_WARM'] ?? (paramMeta['EXC_WARM']?.def ?? 0);
  const pres = paramValues['EXC_PRES'] ?? (paramMeta['EXC_PRES']?.def ?? 0);
  // Zone tint brightens with its knob, so engagement is visible even on dark/
  // quiet material where the live excitation is faint (presence on a dark master
  // can sit near −70 dBFS).
  ctx.fillStyle = AMBER + (0.04 + 0.16 * warm) + ')'; ctx.fillRect(warmX0, 0, warmX1 - warmX0, H);
  ctx.fillStyle = CYAN  + (0.04 + 0.16 * pres) + ')'; ctx.fillRect(presX0, 0, presX1 - presX0, H);

  // ── Live added-harmonic overlay per band (DIRECT wet-spectrum) ──────────
  // The DSP taps each band's actual WET contribution, FFT + EMA-smooths it, and
  // streams a log-spaced dBFS array (warm / pres) via window.axonExciter. We draw
  // THAT directly: the glow in each zone is exactly what that knob adds NOW, so
  // it breathes with the program. Below/above each band the wet is ~0 → floor.
  const EXC_FLO = 20, EXC_FHI = 20000;
  const FLOOR = -90, CEIL = -30;   // wide/low window so faint presence shows
  const yFor = db => { const h = Math.max(0, Math.min(1, (db - FLOOR) / (CEIL - FLOOR))); return H - h * H; };
  const drawFill = (arr, rgb) => {
    if (!Array.isArray(arr) || arr.length < 2) return false;
    const N = arr.length; let any = false;
    ctx.beginPath(); ctx.moveTo(0, H);
    for (let i = 0; i < N; i++) {
      const f = EXC_FLO * Math.pow(EXC_FHI / EXC_FLO, i / (N - 1));
      const db = arr[i] ?? -120; if (db > FLOOR + 0.5) any = true;
      ctx.lineTo(freqToX(f), yFor(db));
    }
    ctx.lineTo(W, H); ctx.closePath();
    ctx.save(); ctx.shadowBlur = 8; ctx.shadowColor = rgb + '1)';
    ctx.fillStyle = rgb + '0.28)'; ctx.fill();
    ctx.strokeStyle = rgb + '0.85)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
    return any;
  };
  let drew = false;
  if (excWetSpec && excWetSpec.active) {
    if (warm > 0) drew = drawFill(excWetSpec.warm, AMBER) || drew;
    if (pres > 0) drew = drawFill(excWetSpec.pres, CYAN) || drew;
  }
  if (!drew) {
    ctx.font = '8px -apple-system, sans-serif';
    ctx.fillStyle = '#3a3a3a'; ctx.textAlign = 'center';
    ctx.fillText((warm > 0 || pres > 0) ? 'play audio to see harmonics'
                                        : 'raise Warmth or Presence', W / 2, H / 2);
  }

  // ── Zone labels ─────────────────────────────────────────────────────────
  ctx.font = '8px -apple-system, sans-serif';
  ctx.fillStyle = AMBER + '0.8)'; ctx.textAlign = 'center';
  ctx.fillText('WARMTH', (warmX0 + warmX1) / 2, 12);
  ctx.fillStyle = CYAN + '0.8)';
  ctx.fillText('PRESENCE', (presX0 + presX1) / 2, 12);
}

// (HARMONICS has fixed Warmth/Presence zones — no draggable band edges.)

// ============================================================
// CHAIN STRIP
// ============================================================

function isProcActive(proc) {
  return proc.wetParams.some(id => {
    const m = paramMeta[id];
    const v = paramValues[id] ?? (m ? m.def : 0);
    return v > 0;
  });
}

let dragSrcIndex = null;

function renderChain() {
  const chain = document.getElementById('chain');
  chain.innerHTML = '';

  procOrder.forEach((procId, i) => {
    if (i > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '›';
      chain.appendChild(arrow);
    }

    const proc   = PROCESSORS.find(p => p.id === procId);
    const active = isProcActive(proc);

    const card = document.createElement('div');
    card.className = 'proc-card' + (procId === selectedProc ? ' selected' : '');
    card.draggable  = true;
    card.dataset.index = i;

    card.innerHTML = `
      <div class="proc-name">${proc.name}</div>
      <div class="proc-dot${active ? ' active' : ''}"></div>
    `;

    card.addEventListener('click', () => {
      selectedProc = procId;
      renderChain();
      renderSurface();
    });

    card.addEventListener('dragstart', e => {
      dragSrcIndex = i;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(i));
      card.style.opacity = '0.5';
    });
    card.addEventListener('dragend', () => {
      card.style.opacity = '1';
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const destIndex = parseInt(card.dataset.index, 10);
      if (dragSrcIndex === null || dragSrcIndex === destIndex) return;

      // Reorder
      const newOrder = [...procOrder];
      const [moved]  = newOrder.splice(dragSrcIndex, 1);
      newOrder.splice(destIndex, 0, moved);
      procOrder   = newOrder;
      dragSrcIndex = null;

      sendOrderToHost(procOrder);
      renderChain();
    });

    chain.appendChild(card);
  });
}

function refreshChain() {
  // Only update dot activeness without full rebuild
  procOrder.forEach((procId, i) => {
    const proc  = PROCESSORS.find(p => p.id === procId);
    const dot   = document.querySelectorAll('.proc-dot')[i];
    if (dot) dot.classList.toggle('active', isProcActive(proc));
  });
}

// ============================================================
// PUBLIC API  (called from C++ via evaluateJavaScript)
// ============================================================

window.axonInit = function(state) {
  paramMeta   = state.paramMeta   || {};
  paramValues = state.paramValues || {};
  const VISIBLE = new Set(PROCESSORS.map(p => p.id));
  procOrder   = (state.processorOrder || [6,3,1,8,9,4,5]).filter(id => VISIBLE.has(id));
  selectedProc = procOrder[0] ?? 1;

  renderChain();
  renderSurface();
  refreshPanelToggles();
};

// ============================================================
// SPECTRUM DISPLAY
// ============================================================

(function() {
  const KDISP = 128;
  const FLO = 20, FHI = 20000;

  // Log-spaced display frequencies (Hz).
  const dispFreqs = Array.from({length: KDISP}, (_, i) =>
    FLO * Math.pow(FHI / FLO, i / (KDISP - 1)));

  // 50-point bin display frequencies — must match kNumBins in C++ (log 20–20k).
  const N_BINS = 50;
  const binFreqs = Array.from({length: N_BINS}, (_, i) =>
    20 * Math.pow(1000, i / (N_BINS - 1)));

  // EQ view mode: 'curve' (biquad approximation) or 'bins' (actual SpectralMask bins).
  let eqViewMode = localStorage.getItem('eqViewMode') || 'bins';

  const toggleBtn  = document.getElementById('eq-view-toggle');
  const curveLabel = document.getElementById('eq-view-curve');
  const binsLabel  = document.getElementById('eq-view-bins');

  // Apply persisted/default mode to toggle UI immediately.
  curveLabel.classList.toggle('active', eqViewMode === 'curve');
  binsLabel.classList.toggle('active',  eqViewMode === 'bins');

  toggleBtn.addEventListener('click', () => {
    eqViewMode = eqViewMode === 'curve' ? 'bins' : 'curve';
    localStorage.setItem('eqViewMode', eqViewMode);
    curveLabel.classList.toggle('active', eqViewMode === 'curve');
    binsLabel.classList.toggle('active',  eqViewMode === 'bins');
  });

  // One color per StageID (indices 0 and 3 are unused — were the levelers).
  const STAGE_COLORS = [
    '#4cc9a8',  // 0 (unused)
    '#e9c46a',  // 1 AutoEQ
    '#f4a261',  // 2 Saturator
    '#5fa8d3',  // 3 SSL EQ
    '#bb86fc',  // 4 SslComp (BUS COMP)
    '#e76f51',  // 5 MelLimiter
    '#90be6d',  // 6 BassMono
    '#f9c74f',  // 7 Exciter
    '#4ea8de',  // 8 Reverb
    '#c792ea',  // 9 Widener (lavender)
  ];
  const STAGE_NAMES = ['—', 'AUTO EQ', 'SAT', 'EQ', 'BUS COMP', 'LIMITER', 'BASS MONO', 'EXCITER', 'REVERB', 'WIDENER'];

  const DB_MIN = -90, DB_MAX = 0;

  function freqToX(f, W) {
    return (Math.log10(f / FLO) / Math.log10(FHI / FLO)) * W;
  }
  function dbToY(db, H) {
    return H - ((Math.max(DB_MIN, Math.min(DB_MAX, db)) - DB_MIN) / (DB_MAX - DB_MIN)) * H;
  }

  function drawSpectrum(data) {
    // Cache the frame so the exciter band display can draw its live
    // "what's being excited" overlay (post−pre spectrum delta).
    excLastSpec = data;
    if (selectedProc === 7) drawExcBand();

    const canvas = document.getElementById('spectrum-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // Background.
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Center Y = 0 dB reference.
    const CY = H / 2;
    const DB_RANGE = 12;  // ±12 dB fills the full height
    function deltaToY(db) {
      return CY - clamp(db / DB_RANGE, -1, 1) * CY;
    }

    // Vertical frequency grid.
    ctx.setLineDash([]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#1c1c1c';
    [50, 100, 200, 500, 1000, 2000, 5000, 10000].forEach(f => {
      const x = Math.round(freqToX(f, W)) + 0.5;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    });

    // Horizontal dB grid (±4, ±8).
    ctx.strokeStyle = '#191919';
    [-8, -4, 4, 8].forEach(db => {
      const y = Math.round(deltaToY(db)) + 0.5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    });

    // Labels.
    ctx.font = '8px -apple-system, sans-serif';
    ctx.fillStyle = '#303030';
    ctx.textAlign = 'center';
    [[100,'100'], [1000,'1k'], [10000,'10k']].forEach(([f, label]) => {
      ctx.fillText(label, freqToX(f, W), H - 14);
    });
    ctx.textAlign = 'left';
    [[8,'+8'], [-8,'-8']].forEach(([db, label]) => {
      ctx.fillText(label, 3, deltaToY(db) + (db > 0 ? -2 : 9));
    });
    ctx.fillText('0', 3, CY - 2);

    // Center line (drawn first so fills render over it, then re-drawn on top).
    function drawCenterLine(alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#555555';
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(0, CY + 0.5); ctx.lineTo(W, CY + 0.5); ctx.stroke();
      ctx.restore();
    }
    drawCenterLine(0.4);

    if (!data) return;

    const order  = data.order;
    const dbData = data.db;
    const autoEQPos = order.indexOf(1);

    // Very dim pre-EQ signal silhouette for spectral context.
    if (autoEQPos > 0 && dbData[autoEQPos - 1]) {
      ctx.save();
      ctx.globalAlpha = 0.10;
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let b = 0; b < KDISP; b++) {
        const x = freqToX(dispFreqs[b], W);
        const y = dbToY(dbData[autoEQPos - 1][b], H);
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fillStyle = '#777777';
      ctx.fill();
      ctx.restore();
    }

    // Show/hide the CURVE/BINS toggle based on whether bins data is available.
    toggleBtn.style.display = data.eq_bins ? 'block' : 'none';

    if (!data.eq && !data.eq_bins) return;

    if (eqViewMode === 'bins' && data.eq_bins) {
      // ── BINS mode: 50-point log-spaced mask response ─────────────
      const bxs = binFreqs.map(f => freqToX(f, W));
      const bys = data.eq_bins.map(db => deltaToY(db));

      function buildBinsPath() {
        ctx.beginPath();
        ctx.moveTo(bxs[0], CY);
        for (let i = 0; i < N_BINS; i++) ctx.lineTo(bxs[i], bys[i]);
        ctx.lineTo(bxs[N_BINS - 1], CY);
        ctx.closePath();
      }

      ctx.save();
      ctx.beginPath(); ctx.rect(0, 0, W, CY); ctx.clip();
      buildBinsPath();
      ctx.fillStyle = 'rgba(76, 201, 168, 0.78)';
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.beginPath(); ctx.rect(0, CY, W, H - CY); ctx.clip();
      buildBinsPath();
      ctx.fillStyle = 'rgba(231, 111, 81, 0.72)';
      ctx.fill();
      ctx.restore();

      drawCenterLine(0.9);

      ctx.save();
      ctx.shadowBlur  = 8;
      ctx.shadowColor = STAGE_COLORS[1];
      ctx.strokeStyle = STAGE_COLORS[1];
      ctx.lineWidth   = 2;
      ctx.setLineDash([]);
      ctx.beginPath();
      for (let i = 0; i < N_BINS; i++)
        i === 0 ? ctx.moveTo(bxs[i], bys[i]) : ctx.lineTo(bxs[i], bys[i]);
      ctx.stroke();
      ctx.restore();

      // Dots at each of the 50 sample points.
      ctx.save();
      for (let i = 0; i < N_BINS; i++) {
        const above = bys[i] <= CY;
        ctx.fillStyle = above ? 'rgba(76, 201, 168, 0.90)' : 'rgba(231, 111, 81, 0.90)';
        ctx.beginPath();
        ctx.arc(bxs[i], bys[i], 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      ctx.setLineDash([]);
      ctx.font = '7px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      const lxb = W - 4;
      ctx.fillStyle = 'rgba(76, 201, 168, 0.90)'; ctx.fillText('▲ BOOST', lxb,  9);
      ctx.fillStyle = 'rgba(231, 111, 81, 0.90)'; ctx.fillText('▼ CUT',   lxb, 19);
      return;
    }

    if (!data.eq) return;

    // ── CURVE mode: biquad approximation from 5 band gains ──────
    const SR = 44100;
    const EQ_BANDS = [
      { kind: 'low_shelf',  fc: 1010,  q: 0.707 },
      { kind: 'peaking',    fc: 110,   q: 0.707 },
      { kind: 'peaking',    fc: 1100,  q: 0.707 },
      { kind: 'peaking',    fc: 7000,  q: 0.707 },
      { kind: 'high_shelf', fc: 10000, q: 0.707 },
    ];

    function biquadResponse(f, b0, b1, b2, a1, a2) {
      const w = 2 * Math.PI * f / SR;
      const cosw = Math.cos(w), sinw = Math.sin(w);
      const cos2w = Math.cos(2*w), sin2w = Math.sin(2*w);
      const numR = b0 + b1*cosw + b2*cos2w;
      const numI =      b1*sinw + b2*sin2w;
      const denR = 1  + a1*cosw + a2*cos2w;
      const denI =      a1*sinw + a2*sin2w;
      const mag2 = (numR*numR + numI*numI) / (denR*denR + denI*denI);
      return 10 * Math.log10(Math.max(mag2, 1e-20));
    }

    function bandCoeffs(band, gain_db) {
      const A  = Math.pow(10, gain_db / 40);
      const w0 = 2 * Math.PI * band.fc / SR;
      const cw = Math.cos(w0), sw = Math.sin(w0);
      const alpha = sw / (2 * band.q);
      if (band.kind === 'peaking') {
        const b0 =  1 + alpha*A, b1 = -2*cw, b2 = 1 - alpha*A;
        const a0 =  1 + alpha/A, a1 = -2*cw, a2 = 1 - alpha/A;
        return [b0/a0, b1/a0, b2/a0, a1/a0, a2/a0];
      } else if (band.kind === 'low_shelf') {
        const sq = 2*Math.sqrt(A)*alpha;
        const b0 =  A*((A+1)-(A-1)*cw+sq),  b1 =  2*A*((A-1)-(A+1)*cw),   b2 = A*((A+1)-(A-1)*cw-sq);
        const a0 =     (A+1)+(A-1)*cw+sq,    a1 =   -2*((A-1)+(A+1)*cw),   a2 =   (A+1)+(A-1)*cw-sq;
        return [b0/a0, b1/a0, b2/a0, a1/a0, a2/a0];
      } else {
        const sq = 2*Math.sqrt(A)*alpha;
        const b0 =  A*((A+1)+(A-1)*cw+sq),  b1 = -2*A*((A-1)+(A+1)*cw),   b2 = A*((A+1)+(A-1)*cw-sq);
        const a0 =     (A+1)-(A-1)*cw+sq,    a1 =    2*((A-1)-(A+1)*cw),   a2 =   (A+1)-(A-1)*cw-sq;
        return [b0/a0, b1/a0, b2/a0, a1/a0, a2/a0];
      }
    }

    const eqGains = data.eq || [0,0,0,0,0];
    const xs     = dispFreqs.map(f => freqToX(f, W));
    const yDelta = dispFreqs.map(f => {
      let totalDb = 0;
      for (let b = 0; b < 5; b++) {
        const [b0,b1,b2,a1,a2] = bandCoeffs(EQ_BANDS[b], eqGains[b]);
        totalDb += biquadResponse(f, b0, b1, b2, a1, a2);
      }
      return deltaToY(totalDb);
    });

    function buildDeltaPath() {
      ctx.beginPath();
      ctx.moveTo(xs[0], CY);
      for (let b = 0; b < KDISP; b++) ctx.lineTo(xs[b], yDelta[b]);
      ctx.lineTo(xs[KDISP - 1], CY);
      ctx.closePath();
    }

    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, W, CY); ctx.clip();
    buildDeltaPath();
    ctx.fillStyle = 'rgba(76, 201, 168, 0.78)';
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.beginPath(); ctx.rect(0, CY, W, H - CY); ctx.clip();
    buildDeltaPath();
    ctx.fillStyle = 'rgba(231, 111, 81, 0.72)';
    ctx.fill();
    ctx.restore();

    drawCenterLine(0.9);

    ctx.save();
    ctx.shadowBlur  = 8;
    ctx.shadowColor = STAGE_COLORS[1];
    ctx.strokeStyle = STAGE_COLORS[1];
    ctx.lineWidth   = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    for (let b = 0; b < KDISP; b++)
      b === 0 ? ctx.moveTo(xs[b], yDelta[b]) : ctx.lineTo(xs[b], yDelta[b]);
    ctx.stroke();
    ctx.restore();

    ctx.setLineDash([]);
    ctx.font = '7px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    const lx = W - 4;
    ctx.fillStyle = 'rgba(76, 201, 168, 0.90)'; ctx.fillText('▲ BOOST', lx,  9);
    ctx.fillStyle = 'rgba(231, 111, 81, 0.90)'; ctx.fillText('▼ CUT',   lx, 19);

    const bandNames = ['LS', '110', '1k', '7k', 'HS'];
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    eqGains.forEach((g, i) => {
      const s = (g >= 0 ? '+' : '') + g.toFixed(1);
      const hue = g > 0.5 ? '76,201,168' : g < -0.5 ? '231,111,81' : '100,100,100';
      ctx.fillStyle = `rgba(${hue},0.85)`;
      ctx.fillText(`${bandNames[i]}:${s}`, 4 + i * 64, H - 3);
    });
  }

  // ── Complete-EQ decomposition overlay ────────────────────────
  // Layers, on top of the Auto-EQ curve: the SSL EQ's contribution (incl. its
  // coupling assist bands — pushed from C++ via axonSslCurve, so SEQ_CAL is
  // visible) and the TOTAL EQ change (Auto EQ + SSL). Lets you see the whole EQ
  // and read off what each stage contributes.
  let sslCurveBins = null;   // 50 log-bins (dB) of the SSL EQ total response, or null when off
  function drawEqOverlay() {
    const canvas = document.getElementById('spectrum-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height, CY = H / 2, DB_RANGE = 12;
    const d2y = db => CY - Math.max(-1, Math.min(1, db / DB_RANGE)) * CY;
    const autoBins = (excLastSpec && excLastSpec.eq_bins) ? excLastSpec.eq_bins : null;
    const sslBins  = sslCurveBins;
    const bx = binFreqs.map(f => freqToX(f, W));
    const line = (vals, color, width, dash, glow) => {
      ctx.save(); ctx.beginPath();
      for (let i = 0; i < N_BINS; i++) {
        const y = d2y(vals[i]); i === 0 ? ctx.moveTo(bx[i], y) : ctx.lineTo(bx[i], y);
      }
      ctx.strokeStyle = color; ctx.lineWidth = width; ctx.setLineDash(dash);
      if (glow) { ctx.shadowBlur = 6; ctx.shadowColor = glow; }
      ctx.stroke(); ctx.restore();
    };
    // SSL contribution (dashed blue), then TOTAL = Auto EQ + SSL (prominent white).
    if (sslBins) line(sslBins, STAGE_COLORS[3], 1.5, [5, 3], null);
    if (autoBins || sslBins) {
      const tot = Array.from({length: N_BINS}, (_, i) =>
        (autoBins ? (autoBins[i] || 0) : 0) + (sslBins ? (sslBins[i] || 0) : 0));
      line(tot, '#f2f2f2', 2.5, [], 'rgba(255,255,255,0.5)');
    }
    // Legend: TOTAL / AUTO EQ / SSL.
    ctx.save();
    ctx.font = '8px -apple-system, sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    let lx = 6;
    const item = (color, label, dashed) => {
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash(dashed ? [4, 2] : []);
      ctx.beginPath(); ctx.moveTo(lx, 8); ctx.lineTo(lx + 14, 8); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = color; ctx.fillText(label, lx + 18, 8);
      lx += 18 + ctx.measureText(label).width + 12;
    };
    item('#f2f2f2', 'TOTAL', false);
    item(STAGE_COLORS[1], 'AUTO EQ', false);
    item(sslBins ? STAGE_COLORS[3] : 'rgba(95,168,211,0.4)', 'EQ', true);
    ctx.restore();
  }

  function paint(data) { drawSpectrum(data); drawEqOverlay(); }

  // Called with no data on init to draw the empty grid.
  paint(null);

  window.axonSpectrum = function(data) { paint(data); };
  // SSL total curve (manual bands + assist) pushed from C++ each ~21fps tick.
  window.axonSslCurve = function(d) { sslCurveBins = (d && d.on) ? d.bins : null; paint(excLastSpec); };
  // Lets SSL knob/toggle edits repaint immediately (curve refreshes next C++ tick).
  window.axonRenderSpectrum = function() { paint(excLastSpec); };
})();

// ============================================================
// LEVEL METERS  (IN / OUT — LUFS / RMS / PEAK)
// ============================================================
(function() {
  const canvas = document.getElementById('meter-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;   // backing pixels (208 × 720)

  // Per-mode scale + which field of the meter payload drives it.
  const MODES = {
    lufs: { field: 'lufs_s', min: -36, max: 0, step: 6, unit: 'LUFS' },
    rms:  { field: 'rms',    min: -48, max: 0, step: 6, unit: 'dB'   },
    peak: { field: 'peak',   min: -48, max: 0, step: 6, unit: 'dB'   },
  };
  // Mastering target window (LUFS).
  const TGT_LO = -14, TGT_HI = -11;

  let mode = localStorage.getItem('meterMode') || 'lufs';
  let last = null;   // most recent payload

  const PAD_T = 16, PAD_B = 30, PAD_L = 30, PAD_R = 8;
  const barTop = PAD_T, barBot = H - PAD_B, barH = barBot - barTop;
  const areaL  = PAD_L, areaR = W - PAD_R, areaW = areaR - areaL;
  const gap = 14;
  const barW = (areaW - gap) / 2;

  function yFor(db, m) {
    const v = Math.max(m.min, Math.min(m.max, db));
    return barTop + (m.max - v) / (m.max - m.min) * barH;
  }
  function fillColor(db) {
    if (mode === 'lufs') {
      if (db >= TGT_LO && db <= TGT_HI) return '#4cc9a8';   // in target
      if (db > TGT_HI) return '#e76f51';                    // too loud
      return '#37726f';                                     // below target
    }
    if (db >= -1) return '#e76f51';
    if (db >= -6) return '#e9c46a';
    return '#4cc9a8';
  }

  function drawBar(x, db, label, m) {
    // Track.
    ctx.fillStyle = '#181818';
    ctx.fillRect(x, barTop, barW, barH);
    // Fill from bottom to value.
    if (db > m.min) {
      const y = yFor(db, m);
      ctx.fillStyle = fillColor(db);
      ctx.fillRect(x, y, barW, barBot - y);
    }
    // Bar outline.
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, barTop + 0.5, barW - 1, barH - 1);
    // Column label.
    ctx.fillStyle = '#888';
    ctx.font = '700 13px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, x + barW / 2, H - 10);
  }

  function draw() {
    const m = MODES[mode];
    ctx.clearRect(0, 0, W, H);

    // dB grid + labels.
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let db = m.max; db >= m.min; db -= m.step) {
      const y = yFor(db, m);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath(); ctx.moveTo(areaL, y); ctx.lineTo(areaR, y); ctx.stroke();
      ctx.fillStyle = '#666';
      ctx.fillText(String(db), areaL - 4, y);
    }

    // LUFS target zone band (-14 … -11).
    if (mode === 'lufs') {
      const yHi = yFor(TGT_HI, m), yLo = yFor(TGT_LO, m);
      ctx.fillStyle = 'rgba(76,201,168,0.16)';
      ctx.fillRect(areaL, yHi, areaW, yLo - yHi);
      ctx.strokeStyle = 'rgba(76,201,168,0.55)';
      ctx.setLineDash([4, 3]); ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(areaL, yHi); ctx.lineTo(areaR, yHi); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(areaL, yLo); ctx.lineTo(areaR, yLo); ctx.stroke();
      ctx.setLineDash([]);
    }

    const di = last ? last.in  : null;
    const dop = last ? last.out : null;
    const vIn  = di  ? di[m.field]  : m.min;
    const vOut = dop ? dop[m.field] : m.min;
    drawBar(areaL,             vIn,  'IN',  m);
    drawBar(areaL + barW + gap, vOut, 'OUT', m);

    // Numeric readouts under the canvas.
    const inZone = v => (mode === 'lufs' && v >= TGT_LO && v <= TGT_HI);
    const fmt = v => (v <= m.min + 0.01 || v <= -119) ? '–∞' : v.toFixed(1);
    const elI = document.getElementById('meter-in-val');
    const elO = document.getElementById('meter-out-val');
    elI.textContent = fmt(vIn);
    elO.textContent = fmt(vOut);
    elI.classList.toggle('in-zone', inZone(vIn));
    elO.classList.toggle('in-zone', inZone(vOut));
  }

  // Mode buttons.
  document.querySelectorAll('.meter-mode').forEach(btn => {
    if (btn.dataset.mode === mode) btn.classList.add('on');
    else btn.classList.remove('on');
    btn.addEventListener('click', () => {
      mode = btn.dataset.mode;
      localStorage.setItem('meterMode', mode);
      document.querySelectorAll('.meter-mode').forEach(b =>
        b.classList.toggle('on', b.dataset.mode === mode));
      draw();
    });
  });

  draw();   // empty grid on init

  window.axonMeters = function(data) {
    last = data;
    draw();
  };
})();

// ============================================================
// LIMITER BAND VISUALIZATION  (Mel band levels + gain reduction)
// ============================================================
let limData = null;
// Smoothed display state — rises quickly to show activity, falls slowly so the
// readout is calm/legible instead of ballistic.
const _lim = { lvl: null, gr: null, brick: 0, init: false };

// Scrolling gain-reduction history (peak/brickwall GR, dB ≤ 0), sampled once per
// telemetry frame (~21 fps). We store the RAW incoming GR, NOT the smoothed
// _lim.brick — the whole point is to show the LIMITER's own attack/release
// envelope (which the Dynamic-mode Adaptive Gain/Speed knobs reshape), so we
// must not run it through the UI's display smoothing. ~180 frames ≈ 8.5 s.
const GR_HIST_N = 180;
const grHist = new Float32Array(GR_HIST_N);   // brick (peak) GR, dB ≤ 0
const grBandHist = new Float32Array(GR_HIST_N); // deepest spectral band GR, dB ≤ 0
let grHistHead = 0, grHistLen = 0;
function pushGrHistory(brickDb, bandDb) {
  grHist[grHistHead] = brickDb;
  grBandHist[grHistHead] = bandDb;
  grHistHead = (grHistHead + 1) % GR_HIST_N;
  if (grHistLen < GR_HIST_N) grHistLen++;
}

// Activation → colour: teal (idle) → amber → red (heavy gain reduction).
function grColor(grDb, alpha) {
  const a = Math.max(0, Math.min(1, -grDb / 9));   // 0 dB..-9 dB → 0..1
  const hue = 168 - a * 158;                        // 168 teal → 10 red
  return `hsla(${hue}, ${Math.round(55 + a * 25)}%, ${Math.round(52 + a * 6)}%, ${alpha})`;
}

function drawLimViz() {
  const canvas = document.getElementById('lim-viz-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const LV_TOP = 6, LV_BOT = -60;
  const padL = 22, padB = 12, padT = 14;
  const plotL = padL, plotR = W - 6, plotW = plotR - plotL;
  const plotT = padT, plotB = H - padB, plotH = plotB - plotT;
  const yFor = db => plotT + (LV_TOP - Math.max(LV_BOT, Math.min(LV_TOP, db))) / (LV_TOP - LV_BOT) * plotH;

  // dB grid + labels.
  ctx.font = '8px -apple-system, sans-serif';
  ctx.textBaseline = 'middle';
  for (let db = LV_TOP; db >= LV_BOT; db -= 12) {
    const y = yFor(db);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.textAlign = 'right';
    ctx.fillText(String(db), plotL - 3, y);
  }

  const lvlArr = _lim.lvl, grArr = _lim.gr;
  const NB = lvlArr ? lvlArr.length : 26;
  const slot = plotW / NB;
  const barW = slot * 0.74;

  // Ceiling reference line.
  if (limData && typeof limData.ceiling === 'number') {
    const yc = yFor(limData.ceiling);
    ctx.strokeStyle = 'rgba(76,201,168,0.55)';
    ctx.setLineDash([4, 3]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(plotL, yc); ctx.lineTo(plotR, yc); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(76,201,168,0.8)'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('CEIL', plotL + 2, yc - 6 < plotT ? yc + 6 : yc - 6);
  }

  if (lvlArr) {
    const active = !limData || limData.active !== false;
    ctx.globalAlpha = active ? 1 : 0.3;
    for (let b = 0; b < NB; b++) {
      const lvl = lvlArr[b];
      const gr  = grArr ? grArr[b] : 0;             // ≤ 0 dB (activation)
      const x    = plotL + b * slot + (slot - barW) / 2;
      const yLvl = yFor(lvl), yOut = yFor(lvl + gr);
      // Bar to the band's level, coloured by how hard it's being limited.
      if (plotB - yLvl > 0) {
        ctx.fillStyle = grColor(gr, 0.92);
        ctx.fillRect(x, yLvl, barW, plotB - yLvl);
      }
      // Brighter notch marks how much was shaved off (output → input level).
      if (gr < -0.3 && yOut - yLvl > 0.5) {
        ctx.fillStyle = grColor(gr, 1);
        ctx.fillRect(x, yLvl, barW, Math.min(yOut - yLvl, 3));
      }
    }
    ctx.globalAlpha = 1;

    // Frequency labels at a few decades.
    if (limData && limData.f) {
      ctx.fillStyle = '#666'; ctx.font = '8px -apple-system, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      [100, 1000, 10000].forEach(tf => {
        let bi = 0, bd = 1e9;
        for (let b = 0; b < NB; b++) { const d = Math.abs(limData.f[b] - tf); if (d < bd) { bd = d; bi = b; } }
        const x = plotL + bi * slot + slot / 2;
        ctx.fillText(tf >= 1000 ? (tf / 1000) + 'k' : String(tf), x, H - 3);
      });
    }

    if (!active) {
      ctx.fillStyle = '#888'; ctx.font = '700 11px -apple-system, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('LIMITER OFF', W / 2, H / 2);
    }
  }

  // Legend.
  ctx.font = '8px -apple-system, sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillStyle = grColor(0, 1);  ctx.fillText('■', plotR - 60, 2);
  ctx.fillStyle = grColor(-9, 1); ctx.fillText('■', plotR - 52, 2);
  ctx.fillStyle = '#888';         ctx.fillText('idle → limiting', plotR, 2);
}

// Scrolling gain-reduction-over-time strip. The spectral bands above show WHICH
// frequencies are limited; this shows HOW the gain reduction moves in TIME — so
// the Dynamic-mode Adaptive Gain (attack) / Adaptive Speed (release) knobs, and
// the spectral release, become directly visible (fast vs slow recovery, pumping).
// Newest sample on the right; ~21 fps so ~8.5 s of history fits.
function drawLimGR() {
  const canvas = document.getElementById('lim-gr-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const GR_BOT = -12;                      // strip bottom = -12 dB GR
  const padL = 22, padR = 30, padT = 11, padB = 13;
  const plotL = padL, plotR = W - padR, plotW = plotR - plotL;
  const plotT = padT, plotB = H - padB, plotH = plotB - plotT;
  const yFor = db => plotT + (0 - Math.max(GR_BOT, Math.min(0, db))) / (0 - GR_BOT) * plotH;

  // Horizontal dB grid + labels (0 at top → -12 at bottom).
  ctx.font = '8px -apple-system, sans-serif'; ctx.textBaseline = 'middle';
  [0, -3, -6, -12].forEach(db => {
    const y = yFor(db);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.textAlign = 'right';
    ctx.fillText(String(db), plotL - 3, y);
  });

  ctx.fillStyle = '#666'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('GAIN REDUCTION → time', plotL + 2, 1);

  const n = grHistLen;
  if (n > 1) {
    const start = (grHistHead - n + GR_HIST_N) % GR_HIST_N;
    const xFor = k => plotR - ((n - 1 - k) / (GR_HIST_N - 1)) * plotW; // newest → right

    // Peak (brickwall) GR — filled area from the 0 dB line down to the curve.
    ctx.beginPath();
    ctx.moveTo(xFor(0), plotT);
    for (let k = 0; k < n; k++) ctx.lineTo(xFor(k), yFor(grHist[(start + k) % GR_HIST_N]));
    ctx.lineTo(xFor(n - 1), plotT);
    ctx.closePath();
    ctx.fillStyle = 'rgba(231,111,81,0.20)';
    ctx.fill();

    // Deepest spectral-band GR — faint line (shows spectral release).
    ctx.beginPath();
    for (let k = 0; k < n; k++) {
      const x = xFor(k), y = yFor(grBandHist[(start + k) % GR_HIST_N]);
      k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(76,201,168,0.45)';
    ctx.stroke();

    // Peak GR line on top, brighter.
    ctx.beginPath();
    for (let k = 0; k < n; k++) {
      const x = xFor(k), y = yFor(grHist[(start + k) % GR_HIST_N]);
      k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(231,111,81,0.95)';
    ctx.stroke();
  }

  // Current peak-GR readout at the right edge.
  const cur = grHistLen ? grHist[(grHistHead - 1 + GR_HIST_N) % GR_HIST_N] : 0;
  ctx.fillStyle = '#bbb'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(`${cur <= -0.05 ? cur.toFixed(1) : '0.0'}`, plotR + 3, yFor(Math.max(GR_BOT, cur)));

  // Line legend.
  ctx.font = '8px -apple-system, sans-serif'; ctx.textBaseline = 'bottom';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(231,111,81,0.95)'; ctx.fillText('peak', plotR - 34, H - 2);
  ctx.fillStyle = 'rgba(76,201,168,0.7)';  ctx.fillText('band', plotR, H - 2);
}

window.axonLimiter = function(d) {
  limData = d;
  if (d && d.lvl) {
    const N = d.lvl.length;
    if (!_lim.init || !_lim.lvl || _lim.lvl.length !== N) {
      _lim.lvl = d.lvl.slice(); _lim.gr = (d.gr || []).slice(); _lim.brick = d.brick || 0;
      _lim.init = true;
    } else {
      for (let i = 0; i < N; i++) {
        const tl = d.lvl[i];                       // level: rise fast, fall slow
        _lim.lvl[i] += (tl - _lim.lvl[i]) * (tl > _lim.lvl[i] ? 0.5 : 0.12);
        const tg = d.gr ? d.gr[i] : 0;             // GR (≤0): grab fast, release slow
        _lim.gr[i] += (tg - _lim.gr[i]) * (tg < _lim.gr[i] ? 0.55 : 0.10);
      }
      const tb = d.brick || 0;
      _lim.brick += (tb - _lim.brick) * (tb < _lim.brick ? 0.55 : 0.10);
    }
  }
  // Record RAW (unsmoothed) peak + deepest-band GR for the scrolling strip so it
  // shows the limiter's own attack/release, not the display EMA above.
  {
    let bandMin = 0;
    if (d && d.gr) for (let i = 0; i < d.gr.length; i++) if (d.gr[i] < bandMin) bandMin = d.gr[i];
    pushGrHistory((d && typeof d.brick === 'number') ? d.brick : 0, bandMin);
  }
  if (selectedProc === 5) { drawLimViz(); drawLimGR(); }
};

// ============================================================
// BUS COMP DISTORTION STRIP (model-activity proxy, StageID 4)
// ============================================================
// The bus comp is a learned TCN with no readable internal gain reduction, AND
// it phase-rotates the signal (so a residual rms(wet-dry) is pinned near 0 dB).
// The DSP measures phase-invariant magnitude-squared coherence between the
// model input and output: distortion = 10*log10(1 - γ²). The strip shows that
// distortion plus a crest-reduction "comp" line, pushed once per telemetry
// frame (~21 fps). We store RAW values (no UI smoothing) so the distortion
// tracks the Input knob as you ride it. ~180 frames.
const BC_HIST_N = 180;
const bcHist = new Float32Array(BC_HIST_N);      // distortion level, dB ≤ 0
const bcCrestHist = new Float32Array(BC_HIST_N); // crest reduction, dB ≥ 0
let bcHistHead = 0, bcHistLen = 0;
function pushBcHistory(distDb, crestDb) {
  bcHist[bcHistHead] = distDb;
  bcCrestHist[bcHistHead] = crestDb;
  bcHistHead = (bcHistHead + 1) % BC_HIST_N;
  if (bcHistLen < BC_HIST_N) bcHistLen++;
}

function drawBusCompCrunch() {
  const canvas = document.getElementById('bc-crunch-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Primary axis: distortion (1−coherence) level, 0 dB (top) → -48 dB (bottom).
  const R_TOP = 0, R_BOT = -48;
  // Secondary implied scale for crest reduction "comp": 0 (bottom) → +12 (top).
  const C_TOP = 12, C_BOT = 0;
  const padL = 22, padR = 30, padT = 11, padB = 13;
  const plotL = padL, plotR = W - padR, plotW = plotR - plotL;
  const plotT = padT, plotB = H - padB, plotH = plotB - plotT;
  const yResid = db => plotT + (R_TOP - Math.max(R_BOT, Math.min(R_TOP, db))) / (R_TOP - R_BOT) * plotH;
  const yCrest = db => plotB - (Math.max(C_BOT, Math.min(C_TOP, db)) - C_BOT) / (C_TOP - C_BOT) * plotH;

  // Distortion dB grid + labels (left axis: 0 at top → -48 at bottom).
  ctx.font = '8px -apple-system, sans-serif'; ctx.textBaseline = 'middle';
  [0, -12, -24, -36, -48].forEach(db => {
    const y = yResid(db);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.textAlign = 'right';
    ctx.fillText(String(db), plotL - 3, y);
  });

  ctx.fillStyle = '#666'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('DISTORTION (1−coherence) → time', plotL + 2, 1);

  const n = bcHistLen;
  if (n > 1) {
    const start = (bcHistHead - n + BC_HIST_N) % BC_HIST_N;
    const xFor = k => plotR - ((n - 1 - k) / (BC_HIST_N - 1)) * plotW; // newest → right

    // Distortion — filled area from the bottom up to the curve (primary).
    ctx.beginPath();
    ctx.moveTo(xFor(0), plotB);
    for (let k = 0; k < n; k++) ctx.lineTo(xFor(k), yResid(bcHist[(start + k) % BC_HIST_N]));
    ctx.lineTo(xFor(n - 1), plotB);
    ctx.closePath();
    ctx.fillStyle = 'rgba(187,134,252,0.22)';   // #bb86fc (Bus Comp colour)
    ctx.fill();

    // Crest reduction "comp" — faint secondary line on its own implied scale.
    ctx.beginPath();
    for (let k = 0; k < n; k++) {
      const x = xFor(k), y = yCrest(bcCrestHist[(start + k) % BC_HIST_N]);
      k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(120,200,255,0.45)';
    ctx.stroke();

    // Distortion line on top, brighter (the headline).
    ctx.beginPath();
    for (let k = 0; k < n; k++) {
      const x = xFor(k), y = yResid(bcHist[(start + k) % BC_HIST_N]);
      k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(187,134,252,0.95)';
    ctx.stroke();
  }

  // Current distortion readout at the right edge.
  const cur = bcHistLen ? bcHist[(bcHistHead - 1 + BC_HIST_N) % BC_HIST_N] : -48;
  ctx.fillStyle = '#bbb'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(`${cur.toFixed(1)}`, plotR + 3, yResid(Math.max(R_BOT, cur)));

  // Line legend.
  ctx.font = '8px -apple-system, sans-serif'; ctx.textBaseline = 'bottom';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(187,134,252,0.95)'; ctx.fillText('distort', plotR - 30, H - 2);
  ctx.fillStyle = 'rgba(120,200,255,0.7)';  ctx.fillText('comp', plotR, H - 2);
}

window.axonBusComp = function(d) {
  // Record RAW (unsmoothed) distortion + crest-reduction for the scrolling strip.
  const dist = (d && typeof d.distortion === 'number') ? d.distortion : -48;
  const crest = (d && typeof d.crest === 'number') ? d.crest : 0;
  pushBcHistory(dist, crest);
  if (selectedProc === 4) drawBusCompCrunch();
};

// DIRECT exciter wet-spectrum (the added contribution). Stores the latest frame
// and redraws the band display when the exciter page (proc 7) is selected. It's
// a live spectrum (already EMA-smoothed on the DSP side), so just the current
// frame — no scrolling history needed.
window.axonExciter = function(d) {
  excWetSpec = d || null;
  if (selectedProc === 7) drawExcBand();
};

// ============================================================
// Meter-panel toggles (Auto Gain, Bypass) — meta switches, custom placement
// ============================================================
const PANEL_TOGGLES = [['auto-gain-btn', 'AGN'], ['bypass-btn', 'BYP']];
function refreshPanelToggles() {
  for (const [bid, pid] of PANEL_TOGGLES) {
    const btn = document.getElementById(bid);
    if (btn) btn.classList.toggle('on', (paramValues[pid] ?? 0) >= 0.5);
  }
}
(function() {
  for (const [bid, pid] of PANEL_TOGGLES) {
    const btn = document.getElementById(bid);
    if (!btn) continue;
    btn.addEventListener('click', () => {
      const next = ((paramValues[pid] ?? 0) >= 0.5) ? 0 : 1;
      paramValues[pid] = next;
      sendParam(pid, next);
      refreshPanelToggles();
    });
  }
})();

window.axonSetParam = function(id, value) {
  paramValues[id] = value;

  // Refresh knob, toggle, or enum picker in the control surface
  if (document.querySelector(`.knob-wrap[data-id="${id}"]`)) {
    refreshKnob(id);
  } else if (document.querySelector(`.toggle-wrap[data-id="${id}"]`)) {
    refreshToggle(id);
  } else if (document.querySelector(`.enum-wrap[data-id="${id}"]`)) {
    refreshEnum(id);
  }

  if ((id === 'SHF' || id === 'SLF') && selectedProc === 2) drawSatFilter();
  if ((id === 'EXC_WARM' || id === 'EXC_PRES' || id === 'EXC_ON') && selectedProc === 7) drawExcBand();
  // Dynamic toggle (e.g. host automation) relabels Attack/Release knobs.
  if (id === 'MLA' && selectedProc === 5) renderSurface();
  if (id === 'AGN' || id === 'BYP') refreshPanelToggles();

  refreshChain();
};
