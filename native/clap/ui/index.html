<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axon</title>
<link rel="stylesheet" href="system/tokens.css">
<link rel="stylesheet" href="system/components.css">
<link rel="stylesheet" href="index.css">
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">A<span>X</span>ON</div>
    <div id="header-meta">Mastering Chain</div>
  </div>
  <div id="body-row">
    <div id="main-col">
      <div id="chain"></div>
      <div id="spectrum-view">
        <canvas id="spectrum-canvas"></canvas>
        <button id="eq-view-toggle" title="Toggle EQ view">
          <span id="eq-view-curve">CURVE</span><span id="eq-view-bins" class="active">BINS</span>
        </button>
      </div>
      <div id="surface">
        <div id="controls"></div>
        <div id="viz"></div>
      </div>
    </div>
    <div id="meter-panel">
      <div id="meter-title">LEVELS</div>
      <div id="meter-modes">
        <div class="pill meter-mode is-on" data-mode="lufs">LUFS</div>
        <div class="pill meter-mode" data-mode="rms">RMS</div>
        <div class="pill meter-mode" data-mode="peak">PEAK</div>
      </div>
      <canvas id="meter-canvas"></canvas>
      <div id="meter-readouts">
        <div class="meter-ro"><div class="lbl">IN</div><div class="val" id="meter-in-val">–</div></div>
        <div class="meter-ro"><div class="lbl">OUT</div><div class="val" id="meter-out-val">–</div></div>
      </div>
      <div id="meter-toggles">
        <div id="auto-gain-btn" class="pill" title="Match output loudness to input for fair A/B">AUTO GAIN</div>
        <div id="bypass-btn" class="pill" title="Audition the raw input (level-aligned, no DAW bypass)">BYPASS</div>
      </div>
    </div>
  </div>
</div>

<!-- Design system (order matters: classic scripts, shared window.AX namespace) -->
<script src="system/tokens.js"></script>
<script src="system/canvas.js"></script>
<script src="system/components.js"></script>
<script src="system/loop.js"></script>
<script src="registry.js"></script>
<!-- Modules (each calls AX.registerModule). Chain/default order follows meta. -->
<script src="modules/eq.js"></script>
<script src="modules/autoeq.js"></script>
<script src="modules/buscomp.js"></script>
<script src="modules/bassmono.js"></script>
<script src="modules/reverb.js"></script>
<script src="modules/widener.js"></script>
<script src="modules/limiter.js"></script>
<!-- Shell orchestration (builds UI, installs window.axon* bridge). -->
<script src="app.js"></script>
</body>
</html>
